<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Lane Dodger</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background:
        radial-gradient(circle at 50% 18%, rgba(255, 201, 40, 0.10), transparent 34%),
        #07110a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100dvh;
      overflow: hidden;
    }
    canvas {
      display: block;
      touch-action: none;
    }
  </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
'use strict';

// ─── Canvas & Resize ────────────────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
// increase this version in any change in the code
const GAME_VERSION = 'v0.5.5';

function resize() {
  // Portrait 9:16 ratio, fill the viewport
  const maxH = window.innerHeight;
  const maxW = window.innerWidth;
  const ratio = 9 / 16;
  let w = maxH * ratio;
  let h = maxH;
  if (w > maxW) { w = maxW; h = maxW / ratio; }
  canvas.width  = Math.floor(w);
  canvas.height = Math.floor(h);
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  // Re-snap car after resize if already playing
  if (typeof carX !== 'undefined') {
    const r = roadMetrics();
    if (typeof dreamHighway !== 'undefined' && dreamHighway) {
      const margin = r.W * 0.13;
      targetCarX = Math.max(margin, Math.min(r.W - margin, targetCarX));
      carX = Math.max(margin, Math.min(r.W - margin, carX));
    } else {
      targetCarX = playerLane === 0 ? r.lane0 : r.lane1;
      carX = targetCarX;
    }
  }
}
window.addEventListener('resize', resize);

// ─── roundRect polyfill (pre-Chrome-99 / pre-FF-112) ────────────────────────
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
    r = Math.min(r, w / 2, h / 2);
    this.beginPath();
    this.moveTo(x + r, y);
    this.lineTo(x + w - r, y);
    this.quadraticCurveTo(x + w, y,     x + w, y + r);
    this.lineTo(x + w, y + h - r);
    this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    this.lineTo(x + r, y + h);
    this.quadraticCurveTo(x, y + h,     x, y + h - r);
    this.lineTo(x, y + r);
    this.quadraticCurveTo(x, y,         x + r, y);
    this.closePath();
  };
}

// ─── Road Metrics ───────────────────────────────────────────────────────────
const GRASS_FRAC = 0.10; // fraction of canvas width for each grass strip

function roadMetrics() {
  const W = canvas.width, H = canvas.height;
  const grassW   = W * GRASS_FRAC;
  const roadL    = grassW;
  const roadR    = W - grassW;
  const roadW    = roadR - roadL;
  const laneW    = roadW / 2;
  const centerX  = roadL + roadW / 2;
  const lane0    = roadL + laneW / 2;        // left lane x-center
  const lane1    = roadL + laneW * 1.5;      // right lane x-center
  return { W, H, grassW, roadL, roadR, roadW, laneW, centerX, lane0, lane1 };
}

// ─── Game State ─────────────────────────────────────────────────────────────
let gameState;        // 'menu' | 'playing' | 'paused' | 'gameover'
let score, highScore = 0;
let frame;
let speed;
let playerLane;       // 0 = left, 1 = right
let carX, targetCarX;
let objects;          // [{ x, y, type, size, lane, color, seed }]
let effects;          // [{ x, y, type, size, color, seed, age, duration }]
let roadOffset;
let scoreTimer, spawnTimer, spawnInterval, diffTimer;
let portalTimer, portalInterval;
let nightTimer, nightInterval, nightPhaseTimer, nightPhase;
let selectedCarColor, activeWorld;
let saintRing, whiteWorldPoints;
let missionUnlocked, purpleRingCoinStreak;
let dreamHighway, dreamSpawnTimer, dreamPathTimer, dreamWaveId;
let colorIntroSeen, missionModalShownAt, pauseReason;
let lastObstacleLane, sameLaneObstacleCount;
let lastTouchTime = 0;
let touchStartPoint = null;
let mouseSteeringActive = false;

resize();

const queryParams = new URLSearchParams(window.location.search);
const requestedDevWorld = queryParams.get('world');
const devMode = queryParams.get('mode') === 'dev';
const CAR_Y_FRAC          = 0.78;
const LANE_LERP           = 0.14;
// Empty slots give the road occasional breathing room. Remaining slots are 28% coins.
const EMPTY_SPAWN_PROBABILITY = 0.05;
const COIN_SPAWN_PROBABILITY = 0.28;
const MAX_SAME_LANE_OBSTACLES = 3;
const SPEED_RAMP_BONUS   = 0.27;
const COIN_SPEED_BONUS   = 0.30;
const SPECIAL_COIN_SCORE = 50;
const SPECIAL_COIN_SPEED_BONUS = 1.20;
const SPECIAL_COIN_PROBABILITY = 0.2;
const MAX_SPEED          = 16;
const OPPOSING_OBSTACLE_GAP_MULT = 1.3;
const COLOR_UNLOCK_SCORE = 200;
const SAINT_RING_SCORE = 100;
const PURPLE_RING_COIN_STREAK = 20;
const COLOR_ORDER        = ['blue', 'white', 'purple'];
const devWorld = devMode && COLOR_ORDER.includes(requestedDevWorld) ? requestedDevWorld : null;
const devSpace = devMode && requestedDevWorld === 'space';
const PORTAL_MIN_INTERVAL = 120;
const PORTAL_MAX_INTERVAL = 420;
const PORTAL_SCORE_BONUS = 50;
const NIGHT_MIN_INTERVAL = 200 ;
const NIGHT_MAX_INTERVAL = 700;
const DEV_NIGHT_MIN_INTERVAL = 120;
const DEV_NIGHT_MAX_INTERVAL = 240;
const NIGHT_WARNING_FRAMES = 180;
const NIGHT_DURATION_FRAMES = 300;
const NIGHT_BLINK_FRAMES = 7;
const COLOR_SWIPE_MIN_FRAC = 0.055;
const MISSION_MODAL_MIN_MS = 600;
const DREAM_LERP = 0.24;
const DREAM_SCROLL_SPEED = 5.3;
const DREAM_COIN_PATH_INTERVAL = 78;
const DREAM_UFO_INTERVAL = 54;
// Hitbox is smaller than the visual to feel fair when near-missing
const COLLISION_SCALE     = 0.65;

const ASSET_PATHS = {
  car_blue: 'img/car_blue.png',
  car_white: 'img/car_white.png',
  car_purple: 'img/car_purple.png',
  obstacle_red: 'img/obstacle_red.png',
  ufo: 'img/ufo.png',
  coin_basic: 'img/coin_basic.png',
  coin_red: 'img/coin_red.png',
  grass_dot: 'img/grass_dot.png'
};

const sprites = {};

function loadGameAssets() {
  for (const [name, src] of Object.entries(ASSET_PATHS)) {
    const image = new Image();
    image.src = src;
    sprites[name] = image;
  }
}

function spriteReady(name) {
  const image = sprites[name];
  return image && image.complete && image.naturalWidth > 0;
}

function spriteAspect(name, fallback = 1) {
  const image = sprites[name];
  return image && image.naturalWidth > 0 && image.naturalHeight > 0
    ? image.naturalWidth / image.naturalHeight
    : fallback;
}

const CAR_PALETTES = {
  blue:   { body: '#2980d9', roof: '#1a60a8', glass: 'rgba(190,235,255,0.85)', glass2: 'rgba(190,235,255,0.65)', head: '#ffffbb', tail: '#ff2200' },
  white:  { body: '#f7f6ef', roof: '#dfe9f7', glass: 'rgba(155,205,255,0.78)', glass2: 'rgba(155,205,255,0.56)', head: '#fff5bd', tail: '#ee665e' },
  purple: { body: '#7b35d6', roof: '#35105c', glass: 'rgba(218,166,255,0.78)', glass2: 'rgba(218,166,255,0.54)', head: '#eebcff', tail: '#ff3c8c' }
};

const WORLD_THEMES = {
  blue: {
    grass: '#1b6d2a', grass2: '#228b35', grassDot: '#52bd5d',
    road: '#2e3135', road2: '#24272b', roadStripe: 'rgba(255,255,255,0.035)',
    curb: '#ffc928', curbGlow: 'rgba(255,201,40,0.52)', dash: '#ffffff',
    obstacle: '#e03020', obstacleStroke: '#ff6030', obstacleInner: '#ff8844',
    coin0: '#ffe060', coin1: '#f0a000', coinStroke: '#c08000', coinStar: '#fff0a0',
    hud: '#ffffff', hudPanel: 'rgba(17,17,17,0.80)', hudAccent: '#ffc928'
  },
  white: {
    grass: '#d9efff', grass2: '#edf8ff', grassDot: '#f8fbff',
    road: '#cfd9e8', road2: '#b8c8dd', roadStripe: 'rgba(255,255,255,0.18)',
    curb: '#fff1a8', curbGlow: 'rgba(255,241,168,0.52)', dash: '#fffdf4',
    obstacle: '#df766f', obstacleStroke: '#ffc4a4', obstacleInner: '#ffd4b0',
    coin0: '#fff4a8', coin1: '#eebf45', coinStroke: '#bb9240', coinStar: '#ffffff',
    hud: '#ffffff', hudPanel: 'rgba(13,19,31,0.78)', hudAccent: '#fff1a8'
  },
  purple: {
    grass: '#170b25', grass2: '#24143a', grassDot: '#5d348f',
    road: '#1e1727', road2: '#15101d', roadStripe: 'rgba(216,182,255,0.055)',
    curb: '#8d4dff', curbGlow: 'rgba(141,77,255,0.56)', dash: '#d8b6ff',
    obstacle: '#9f144f', obstacleStroke: '#ff4e9c', obstacleInner: '#4a0a33',
    coin0: '#e7a8ff', coin1: '#8d4dff', coinStroke: '#4c237f', coinStar: '#f4dcff',
    hud: '#f5dcff', hudPanel: 'rgba(9,5,16,0.82)', hudAccent: '#d8b6ff'
  }
};

loadGameAssets();

function initGame() {
  const r    = roadMetrics();
  playerLane = 0;
  carX       = r.lane0;
  targetCarX = r.lane0;
  objects    = [];
  effects    = [];
  score      = 0;
  frame      = 0;
  speed      = 4;
  roadOffset = 0;
  scoreTimer = 0;
  spawnTimer = 0;
  spawnInterval = 88;
  diffTimer  = 0;
  portalTimer = 0;
  portalInterval = randomPortalInterval();
  nightTimer = 0;
  nightInterval = randomNightInterval();
  nightPhaseTimer = 0;
  nightPhase = 'idle';
  colorIntroSeen = devMode;
  missionModalShownAt = 0;
  pauseReason = null;
  selectedCarColor = devWorld || 'blue';
  activeWorld = devWorld || 'blue';
  saintRing = false;
  whiteWorldPoints = 0;
  missionUnlocked = {
    blue: colorFeatureUnlocked(),
    white: false,
    purple: false
  };
  purpleRingCoinStreak = 0;
  dreamHighway = false;
  dreamSpawnTimer = 0;
  dreamPathTimer = 0;
  dreamWaveId = 0;
  lastObstacleLane = null;
  sameLaneObstacleCount = 0;

  if (devSpace) {
    missionUnlocked = { blue: true, white: true, purple: true };
    startDreamHighway();
  }
}

function randomPortalInterval() {
  return PORTAL_MIN_INTERVAL + Math.floor(Math.random() * (PORTAL_MAX_INTERVAL - PORTAL_MIN_INTERVAL + 1));
}

function randomNightInterval() {
  const minInterval = devMode ? DEV_NIGHT_MIN_INTERVAL : NIGHT_MIN_INTERVAL;
  const maxInterval = devMode ? DEV_NIGHT_MAX_INTERVAL : NIGHT_MAX_INTERVAL;
  return minInterval + Math.floor(Math.random() * (maxInterval - minInterval + 1));
}

function colorFeatureUnlocked() {
  return devMode || score >= COLOR_UNLOCK_SCORE;
}

function setActiveWorld(world) {
  if (activeWorld === 'white' && world !== 'white') whiteWorldPoints = 0;
  if (activeWorld !== 'white' && world === 'white') whiteWorldPoints = 0;
  activeWorld = world;
}

function addScore(points) {
  score += points;
  if (colorFeatureUnlocked()) completeMission('blue');
  if (activeWorld !== 'white' || saintRing) return;

  whiteWorldPoints += points;
  if (whiteWorldPoints >= SAINT_RING_SCORE) {
    saintRing = true;
    whiteWorldPoints = 0;
    completeMission('white');
    effects.push({
      x: carX,
      y: carDims().carY,
      type: 'saintRingGain',
      size: carDims().carW * 0.72,
      age: 0,
      duration: 42
    });
  }
}

function completeMission(color) {
  if (!missionUnlocked || missionUnlocked[color]) return;
  missionUnlocked[color] = true;
  if (color === 'white') showMissionModal('whiteMission');
  if (color === 'purple') showMissionModal('purpleMission');
}

function showMissionModal(reason) {
  pauseReason = reason;
  missionModalShownAt = performance.now();
  gameState = 'paused';
}

function clampDreamX(x) {
  const r = roadMetrics();
  const margin = r.W * 0.13;
  return Math.max(margin, Math.min(r.W - margin, x));
}

function startDreamHighway() {
  const r = roadMetrics();
  dreamHighway = true;
  dreamSpawnTimer = 0;
  dreamPathTimer = DREAM_COIN_PATH_INTERVAL - 18;
  dreamWaveId = 0;
  activeWorld = 'purple';
  selectedCarColor = 'purple';
  saintRing = false;
  whiteWorldPoints = 0;
  speed = DREAM_SCROLL_SPEED;
  objects = [];
  effects = [];
  resetNightEffect();
  carX = clampDreamX(r.centerX);
  targetCarX = carX;
}

function spawnDreamCoinPath() {
  const r = roadMetrics();
  const count = 9;
  const baseY = -r.H * 0.08;
  const spacing = r.H * 0.060;
  const amplitude = r.W * (0.18 + Math.random() * 0.10);
  const center = r.W * (0.37 + Math.random() * 0.26);
  const phase = Math.random() * Math.PI * 2;
  const wave = dreamWaveId++;
  const size = r.W * 0.052;
  const specialIndex = isSpecialCoin() ? Math.floor(Math.random() * count) : -1;

  for (let i = 0; i < count; i++) {
    const curve = Math.sin(i * 0.78 + phase);
    const x = Math.max(r.W * 0.14, Math.min(r.W * 0.86, center + curve * amplitude));
    objects.push({
      x,
      y: baseY - i * spacing,
      type: 'collect',
      size,
      special: i === specialIndex,
      vx: Math.sin(phase + i * 0.34) * 0.22,
      vy: speed * 0.92,
      driftPhase: phase + i * 0.50,
      driftAmp: r.W * 0.010,
      wave
    });
  }
}

function spawnDreamUfo() {
  const r = roadMetrics();
  const fromLeft = Math.random() < 0.5;
  const size = r.W * (0.052 + Math.random() * 0.018);
  const y = -size * (1.2 + Math.random() * 3.5);
  const x = fromLeft ? -size * 1.4 : r.W + size * 1.4;
  const targetX = r.W * (0.18 + Math.random() * 0.64);
  const travelFrames = 70 + Math.random() * 52;
  const vx = (targetX - x) / travelFrames;
  const vy = speed * (0.82 + Math.random() * 0.42);

  objects.push({
    x,
    y,
    type: 'ufo',
    size,
    vx,
    vy,
    rotation: Math.random() * Math.PI * 2,
    spin: (Math.random() < 0.5 ? -1 : 1) * (0.018 + Math.random() * 0.018),
    driftPhase: Math.random() * Math.PI * 2,
    driftAmp: r.W * (0.010 + Math.random() * 0.015),
    seed: Math.floor(Math.random() * 100000)
  });
}

function updateDreamHighway() {
  carX += (targetCarX - carX) * DREAM_LERP;
  roadOffset += speed;

  if (++scoreTimer >= 30) { addScore(1); scoreTimer = 0; }

  if (++dreamPathTimer >= DREAM_COIN_PATH_INTERVAL) {
    spawnDreamCoinPath();
    dreamPathTimer = 0;
  }

  if (++dreamSpawnTimer >= DREAM_UFO_INTERVAL) {
    spawnDreamUfo();
    dreamSpawnTimer = 0;
  }

  updateEffects();

  for (let i = objects.length - 1; i >= 0; i--) {
    const obj = objects[i];
    obj.y += obj.vy || speed;
    obj.x += obj.vx || 0;
    if (typeof obj.driftPhase === 'number') {
      obj.driftPhase += 0.055;
      obj.x += Math.sin(obj.driftPhase) * (obj.driftAmp || 0);
    }
    if (typeof obj.rotation === 'number') obj.rotation += obj.spin || 0;

    if (
      obj.y > canvas.height + obj.size * 2 ||
      obj.x < -obj.size * 4 ||
      obj.x > canvas.width + obj.size * 4
    ) {
      objects.splice(i, 1);
      continue;
    }

    if (collides(obj)) {
      if (obj.type === 'ufo') {
        endGame();
        return;
      }
      if (obj.type === 'collect') {
        collectCoin(obj);
        objects.splice(i, 1);
      }
    }
  }
}

function currentTheme() {
  return WORLD_THEMES[activeWorld] || WORLD_THEMES.blue;
}

function cycleCarColor(direction = 1) {
  if (!colorFeatureUnlocked()) return false;
  const idx = COLOR_ORDER.indexOf(selectedCarColor);
  const nextIdx = (idx + direction + COLOR_ORDER.length) % COLOR_ORDER.length;
  selectedCarColor = COLOR_ORDER[nextIdx];
  return true;
}

function endGame() {
  if (score > highScore) highScore = score;
  gameState = 'gameover';
}

function breakSaintRing(obj) {
  saintRing = false;
  whiteWorldPoints = 0;
  purpleRingCoinStreak = 0;
  effects.push({
    x: obj.x,
    y: obj.y,
    type: 'saintRingBreak',
    size: obj.size,
    age: 0,
    duration: 34
  });
}

function registerMissedCoin() {
  if (!saintRing || missionUnlocked.purple) return;
  purpleRingCoinStreak = 0;
}

function registerCollectedCoin(hadSaintRing) {
  if (!hadSaintRing || missionUnlocked.purple) return;
  purpleRingCoinStreak++;
  if (purpleRingCoinStreak >= PURPLE_RING_COIN_STREAK) {
    completeMission('purple');
  }
}

function isSpecialCoin() {
  return Math.random() < SPECIAL_COIN_PROBABILITY;
}

function collectCoin(obj, hadSaintRing = false) {
  effects.push({
    x: obj.x,
    y: obj.y,
    type: 'coinPop',
    size: obj.size,
    color: obj.special ? 'red' : selectedCarColor,
    age: 0,
    duration: obj.special ? 30 : 22
  });
  addScore(obj.special ? SPECIAL_COIN_SCORE : 10);
  if (hadSaintRing) registerCollectedCoin(hadSaintRing);
  speed = Math.min(speed + (obj.special ? SPECIAL_COIN_SPEED_BONUS : COIN_SPEED_BONUS), MAX_SPEED);
}

function collapsePortal(portal) {
  effects.push({
    x: portal.x,
    y: portal.y,
    type: 'portalCollapse',
    size: portal.size,
    color: portal.color,
    seed: portal.seed,
    age: 0,
    duration: 28
  });
}

// ─── Car Dimensions (top-down view) ─────────────────────────────────────────
function carDims() {
  const r   = roadMetrics();
  const carScale = dreamHighway ? 0.26 : 0.52;
  const carW = r.laneW * carScale;
  const carH = carW * 1.85;
  const carY = canvas.height * CAR_Y_FRAC;
  return { carW, carH, carY };
}

// ─── Spawn Object ────────────────────────────────────────────────────────────
function objectLane(obj, r) {
  if (typeof obj.lane === 'number') return obj.lane;
  return Math.abs(obj.x - r.lane0) <= Math.abs(obj.x - r.lane1) ? 0 : 1;
}

function canSpawnObstacleInLane(lane, y, minGap, r) {
  return !objects.some(obj =>
    obj.type === 'obstacle' &&
    objectLane(obj, r) !== lane &&
    Math.abs(obj.y - y) < minGap
  );
}

function pickObstacleLane(preferredLane, y, minGap, r) {
  const forcedLane = sameLaneObstacleCount >= MAX_SAME_LANE_OBSTACLES
    ? 1 - lastObstacleLane
    : null;

  if (forcedLane !== null) {
    return canSpawnObstacleInLane(forcedLane, y, minGap, r) ? forcedLane : null;
  }

  const otherLane = preferredLane === 0 ? 1 : 0;
  if (canSpawnObstacleInLane(preferredLane, y, minGap, r)) return preferredLane;
  return canSpawnObstacleInLane(otherLane, y, minGap, r) ? otherLane : null;
}

function registerObstacleLane(lane) {
  if (lane === lastObstacleLane) {
    sameLaneObstacleCount++;
  } else {
    lastObstacleLane = lane;
    sameLaneObstacleCount = 1;
  }
}

function spawnObject() {
  const r    = roadMetrics();
  if (Math.random() < EMPTY_SPAWN_PROBABILITY) return;

  let lane = Math.random() < 0.5 ? 0 : 1;
  const type = Math.random() < COIN_SPAWN_PROBABILITY ? 'collect' : 'obstacle';
  const size = r.laneW * 0.32;
  const y = -size * 1.2;

  if (type === 'obstacle') {
    const minGap = carDims().carH * OPPOSING_OBSTACLE_GAP_MULT;
    lane = pickObstacleLane(lane, y, minGap, r);
    if (lane === null) return;
  }

  const x = lane === 0 ? r.lane0 : r.lane1;
  objects.push({ x, y, type, size, lane, special: type === 'collect' && isSpecialCoin() });
  if (type === 'obstacle') registerObstacleLane(lane);
}

function spawnPortal() {
  if (!colorFeatureUnlocked() || objects.some(obj => obj.type === 'portal')) return false;

  const r = roadMetrics();
  const lane = Math.random() < 0.5 ? 0 : 1;
  const choices = COLOR_ORDER.filter(color => color !== activeWorld);
  const color = choices[Math.floor(Math.random() * choices.length)];
  const size = r.laneW * 0.48;
  const y = -size * 1.6;
  const seed = Math.floor(Math.random() * 100000);

  const x = lane === 0 ? r.lane0 : r.lane1;
  objects.push({ x, y, type: 'portal', size, lane, color, seed });
  return true;
}

// ─── Collision ───────────────────────────────────────────────────────────────
function collides(obj) {
  const { carW, carH, carY } = carDims();
  const cL = carX  - carW * COLLISION_SCALE / 2;
  const cR = carX  + carW * COLLISION_SCALE / 2;
  const cT = carY  - carH * COLLISION_SCALE / 2;
  const cB = carY  + carH * COLLISION_SCALE / 2;
  const oS = obj.size * 0.85;
  return cL < obj.x + oS && cR > obj.x - oS &&
         cT < obj.y + oS && cB > obj.y - oS;
}

// ─── Update ──────────────────────────────────────────────────────────────────
function update() {
  if (dreamHighway) {
    updateDreamHighway();
    return;
  }

  maybeShowColorIntro();
  updateNightEffect();

  carX += (targetCarX - carX) * LANE_LERP;

  // Scroll road
  roadOffset += speed;

  // Score every 30 frames (~½ s at 60 fps)
  if (++scoreTimer >= 30) { addScore(1); scoreTimer = 0; }

  // Difficulty ramp every ~5 s
  if (++diffTimer >= 300) {
    speed         = Math.min(speed + SPEED_RAMP_BONUS, MAX_SPEED);
    spawnInterval = Math.max(spawnInterval - 5, 31);
    diffTimer = 0;
  }

  if (colorFeatureUnlocked()) portalTimer++;

  // Spawn
  if (++spawnTimer >= spawnInterval) {
    if (portalTimer >= portalInterval && spawnPortal()) {
      portalTimer = 0;
      portalInterval = randomPortalInterval();
    } else {
      spawnObject();
    }
    spawnTimer = 0;
  }

  updateEffects();

  // Move & check objects
  for (let i = objects.length - 1; i >= 0; i--) {
    objects[i].y += speed;
    if (objects[i].y > canvas.height + objects[i].size * 2) {
      if (objects[i].type === 'collect') registerMissedCoin();
      objects.splice(i, 1);
      continue;
    }
    if (collides(objects[i])) {
      if (objects[i].type === 'obstacle') {
        if (saintRing) {
          breakSaintRing(objects[i]);
          objects.splice(i, 1);
          continue;
        }
        endGame();
        return;
      } else if (objects[i].type === 'collect') {
        const hadSaintRing = saintRing;
        collectCoin(objects[i], hadSaintRing);
        objects.splice(i, 1);
      } else if (objects[i].type === 'portal') {
        if (selectedCarColor !== objects[i].color) {
          collapsePortal(objects[i]);
          objects.splice(i, 1);
          continue;
        }
        setActiveWorld(objects[i].color);
        addScore(PORTAL_SCORE_BONUS);
        resetNightEffect();
        objects.splice(i, 1);
      }
    }
  }
}

function updateEffects() {
  for (let i = effects.length - 1; i >= 0; i--) {
    effects[i].age++;
    if (effects[i].age >= effects[i].duration) effects.splice(i, 1);
  }
}

function maybeShowColorIntro() {
  if (!colorIntroSeen && colorFeatureUnlocked()) {
    colorIntroSeen = true;
    showMissionModal('colorIntro');
  }
}

function canCloseMissionModal() {
  return performance.now() - missionModalShownAt >= MISSION_MODAL_MIN_MS;
}

function resetNightEffect() {
  nightTimer = 0;
  nightInterval = randomNightInterval();
  nightPhaseTimer = 0;
  nightPhase = 'idle';
}

function updateNightEffect() {
  if (activeWorld !== 'white') {
    resetNightEffect();
    return;
  }

  if (nightPhase === 'idle') {
    if (++nightTimer >= nightInterval) {
      nightPhase = 'warning';
      nightPhaseTimer = 0;
    }
    return;
  }

  nightPhaseTimer++;
  if (nightPhase === 'warning' && nightPhaseTimer >= NIGHT_WARNING_FRAMES) {
    nightPhase = 'night';
    nightPhaseTimer = 0;
  } else if (nightPhase === 'night' && nightPhaseTimer >= NIGHT_DURATION_FRAMES) {
    resetNightEffect();
  }
}

// ─── Drawing Helpers ─────────────────────────────────────────────────────────

function pseudoRandom(seed) {
  const x = Math.sin(seed * 12.9898) * 43758.5453;
  return x - Math.floor(x);
}

function hexToRgb(hex) {
  const value = hex.replace('#', '');
  const normalized = value.length === 3
    ? value.split('').map(char => char + char).join('')
    : value;
  const number = parseInt(normalized, 16);
  return {
    r: (number >> 16) & 255,
    g: (number >> 8) & 255,
    b: number & 255
  };
}

function alphaHex(hex, alpha) {
  const rgb = hexToRgb(hex);
  return `rgba(${rgb.r},${rgb.g},${rgb.b},${alpha})`;
}

function drawSprite(name, x, y, w, h, options = {}) {
  if (!spriteReady(name)) return false;

  const {
    alpha = 1,
    rotation = 0,
    shadowColor = 'rgba(0,0,0,0.35)',
    shadowBlur = 0,
    shadowOffsetX = 0,
    shadowOffsetY = 0
  } = options;

  ctx.save();
  ctx.translate(x, y);
  if (rotation) ctx.rotate(rotation);
  ctx.globalAlpha = alpha;
  ctx.shadowColor = shadowColor;
  ctx.shadowBlur = shadowBlur;
  ctx.shadowOffsetX = shadowOffsetX;
  ctx.shadowOffsetY = shadowOffsetY;
  ctx.drawImage(sprites[name], -w / 2, -h / 2, w, h);
  ctx.restore();
  return true;
}

function drawBackground(r) {
  const theme = currentTheme();

  // Grass strips
  const grassGradient = ctx.createLinearGradient(0, 0, r.W, 0);
  grassGradient.addColorStop(0, theme.grass);
  grassGradient.addColorStop(0.18, theme.grass2);
  grassGradient.addColorStop(0.82, theme.grass2);
  grassGradient.addColorStop(1, theme.grass);
  ctx.fillStyle = grassGradient;
  ctx.fillRect(0, 0, r.grassW, r.H);
  ctx.fillRect(r.roadR, 0, r.grassW, r.H);

  // Animated grass dots for motion feel
  const dotSpacing = r.H * 0.075;
  const dotOffset  = roadOffset * 0.4 % dotSpacing;
  let row = 0;
  for (let y = -dotSpacing + dotOffset; y < r.H + dotSpacing; y += dotSpacing) {
    for (let side = 0; side < 2; side++) {
      for (let col = 0; col < 2; col++) {
        const seed = row * 11 + side * 37 + col * 19 + 1;
        const jitterX = (pseudoRandom(seed) - 0.5) * r.grassW * 0.18;
        const jitterY = (pseudoRandom(seed + 3) - 0.5) * dotSpacing * 0.46;
        const scale = 0.58 + Math.abs(pseudoRandom(seed + 6)) * 0.52;
        const alpha = 0.18 + Math.abs(pseudoRandom(seed + 9)) * 0.24;
        const xBase = side === 0 ? 0 : r.roadR;
        const x = xBase + r.grassW * (0.32 + col * 0.38) + jitterX;
        const gy = y + col * dotSpacing * 0.42 + jitterY;
        const dotW = r.grassW * 0.36 * scale;
        const dotH = dotW * 0.64;

        if (spriteReady('grass_dot')) {
          drawSprite('grass_dot', x, gy, dotW, dotH, { alpha, rotation: (pseudoRandom(seed + 12) - 0.5) * 0.55 });
        } else {
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.fillStyle = theme.grassDot;
          ctx.beginPath();
          ctx.ellipse(x, gy, dotW * 0.28, dotH * 0.28, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
      }
    }
    row++;
  }

  if (activeWorld === 'white') drawDreamClouds(r, dotOffset);
  if (activeWorld === 'purple') drawSideCreatures(r, dotOffset);
}

function drawRoad(r) {
  const theme = currentTheme();

  // Road surface
  const roadGradient = ctx.createLinearGradient(r.roadL, 0, r.roadR, 0);
  roadGradient.addColorStop(0, theme.road2);
  roadGradient.addColorStop(0.18, theme.road);
  roadGradient.addColorStop(0.50, theme.road);
  roadGradient.addColorStop(0.82, theme.road);
  roadGradient.addColorStop(1, theme.road2);
  ctx.fillStyle = roadGradient;
  ctx.fillRect(r.roadL, 0, r.roadW, r.H);

  const stripeSpacing = r.H * 0.12;
  const stripeOffset = (roadOffset * 0.25) % stripeSpacing;
  ctx.fillStyle = theme.roadStripe;
  for (let y = -stripeSpacing + stripeOffset; y < r.H + stripeSpacing; y += stripeSpacing) {
    ctx.fillRect(r.roadL, y, r.roadW, Math.max(1, r.H * 0.004));
  }

  // Edge curbs (yellow)
  const curbW = Math.max(4, r.W * 0.011);
  ctx.save();
  ctx.shadowColor = theme.curbGlow;
  ctx.shadowBlur = Math.max(6, r.W * 0.028);
  ctx.fillStyle = theme.curb;
  ctx.fillRect(r.roadL - curbW * 0.25, 0, curbW, r.H);
  ctx.fillRect(r.roadR - curbW * 0.75, 0, curbW, r.H);
  ctx.restore();

  // Scrolling centre dashes
  const dashH  = r.H * 0.065;
  const gapH   = r.H * 0.050;
  const period = dashH + gapH;
  const off    = roadOffset % period;
  ctx.fillStyle = theme.dash;
  ctx.shadowColor = 'rgba(255,255,255,0.20)';
  ctx.shadowBlur = Math.max(2, r.W * 0.008);
  for (let y = -period + off; y < r.H + period; y += period) {
    const dashW = Math.max(4, r.W * 0.012);
    ctx.beginPath();
    ctx.roundRect(r.centerX - dashW / 2, y, dashW, dashH, dashW / 2);
    ctx.fill();
  }
  ctx.shadowBlur = 0;
}

function drawSpaceBackground(r) {
  const sky = ctx.createLinearGradient(0, 0, 0, r.H);
  sky.addColorStop(0, '#03020a');
  sky.addColorStop(0.45, '#100724');
  sky.addColorStop(1, '#05030d');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, r.W, r.H);

  const starLayers = [
    { count: 58, speed: 0.20, alpha: 0.42, size: 0.004 },
    { count: 36, speed: 0.46, alpha: 0.66, size: 0.006 },
    { count: 18, speed: 0.82, alpha: 0.86, size: 0.008 }
  ];

  ctx.save();
  for (let layer = 0; layer < starLayers.length; layer++) {
    const config = starLayers[layer];
    for (let i = 0; i < config.count; i++) {
      const seed = layer * 1009 + i * 37 + 13;
      const x = pseudoRandom(seed) * r.W;
      const y = (pseudoRandom(seed + 5) * r.H + roadOffset * config.speed) % r.H;
      const twinkle = 0.64 + Math.sin(frame * 0.025 + seed) * 0.36;
      const radius = Math.max(0.7, r.W * config.size * (0.55 + pseudoRandom(seed + 9) * 0.85));
      ctx.globalAlpha = config.alpha * twinkle;
      ctx.fillStyle = pseudoRandom(seed + 17) > 0.72 ? '#d8b6ff' : '#ffffff';
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  ctx.globalAlpha = 0.16;
  ctx.strokeStyle = '#8d4dff';
  ctx.lineWidth = Math.max(1, r.W * 0.004);
  for (let i = 0; i < 4; i++) {
    const y = (r.H * (0.18 + i * 0.24) + roadOffset * 0.16) % (r.H * 1.2) - r.H * 0.1;
    ctx.beginPath();
    ctx.moveTo(-r.W * 0.10, y);
    ctx.bezierCurveTo(r.W * 0.25, y - r.H * 0.08, r.W * 0.68, y + r.H * 0.12, r.W * 1.10, y);
    ctx.stroke();
  }
  ctx.restore();
}

function drawDreamCloud(x, y, size) {
  ctx.save();
  ctx.translate(x, y);
  ctx.fillStyle = 'rgba(255,255,255,0.82)';
  ctx.beginPath();
  ctx.arc(-size * 0.34, 0, size * 0.30, 0, Math.PI * 2);
  ctx.arc(0, -size * 0.10, size * 0.38, 0, Math.PI * 2);
  ctx.arc(size * 0.34, 0, size * 0.28, 0, Math.PI * 2);
  ctx.roundRect(-size * 0.55, -size * 0.02, size * 1.1, size * 0.34, size * 0.16);
  ctx.fill();
  ctx.restore();
}

function drawDreamClouds(r, offset) {
  const spacing = r.H * 0.17;
  const drift = offset * 0.65 % spacing;
  for (let y = -spacing + drift; y < r.H + spacing; y += spacing) {
    drawDreamCloud(r.grassW * 0.48, y, r.grassW * 0.95);
    drawDreamCloud(r.roadR + r.grassW * 0.52, y + spacing * 0.45, r.grassW * 0.85);
  }
}

function drawCreature(x, y, size, flip, eyeColor = '#d8b6ff') {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(flip ? -1 : 1, 1);

  ctx.fillStyle = '#0a0610';
  ctx.beginPath();
  ctx.ellipse(0, 0, size * 0.45, size * 0.34, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(size * 0.34, -size * 0.22, size * 0.22, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = '#0a0610';
  ctx.lineWidth = Math.max(2, size * 0.07);
  ctx.beginPath();
  ctx.moveTo(-size * 0.30, size * 0.14);
  ctx.quadraticCurveTo(-size * 0.62, size * 0.44, -size * 0.18, size * 0.58);
  ctx.stroke();

  ctx.fillStyle = eyeColor;
  if (eyeColor === '#ff233d') {
    ctx.shadowColor = 'rgba(255,35,61,0.85)';
    ctx.shadowBlur = size * 0.10;
  }
  ctx.beginPath();
  ctx.arc(size * 0.29, -size * 0.24, size * 0.035, 0, Math.PI * 2);
  ctx.arc(size * 0.42, -size * 0.24, size * 0.035, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawSideCreatures(r, offset) {
  const spacing = r.H * 0.19;
  const drift = offset * 0.85 % spacing;
  const eyeColor = saintRing ? '#ff233d' : '#d8b6ff';
  for (let y = -spacing + drift; y < r.H + spacing; y += spacing) {
    drawCreature(r.grassW * 0.44, y, r.grassW * 0.78, false, eyeColor);
    drawCreature(r.roadR + r.grassW * 0.56, y + spacing * 0.48, r.grassW * 0.70, true, eyeColor);
  }
}

function drawObstacle(x, y, size) {
  // Red/orange diamond (rotated square) — danger shape
  const theme = currentTheme();
  if (drawSprite('obstacle_red', x, y, size * 1.72, size * 1.72, {
    shadowColor: 'rgba(0,0,0,0.42)',
    shadowBlur: size * 0.22,
    shadowOffsetY: size * 0.12
  })) {
    return;
  }

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(Math.PI / 4);
  const s = size * 0.72;

  // Outer
  ctx.shadowColor = 'rgba(0,0,0,0.36)';
  ctx.shadowBlur = size * 0.20;
  ctx.shadowOffsetY = size * 0.10;
  ctx.fillStyle   = theme.obstacle;
  ctx.strokeStyle = theme.obstacleStroke;
  ctx.lineWidth   = 2.5;
  ctx.beginPath();
  ctx.roundRect(-s, -s, s * 2, s * 2, s * 0.18);
  ctx.fill();
  ctx.stroke();

  // Inner highlight
  ctx.shadowBlur = 0;
  ctx.shadowOffsetY = 0;
  const si = s * 0.45;
  ctx.fillStyle = theme.obstacleInner;
  ctx.beginPath();
  ctx.roundRect(-si, -si, si * 2, si * 2, si * 0.18);
  ctx.fill();

  ctx.restore();
}

function drawUfo(x, y, size, rotation = 0, seed = 0) {
  const wobble = Math.sin(frame * 0.08 + seed) * size * 0.08;
  if (drawSprite('ufo', x, y + wobble, size * 1.9, size * 1.35, {
    rotation,
    shadowColor: 'rgba(216,182,255,0.46)',
    shadowBlur: size * 0.24,
    shadowOffsetY: size * 0.08
  })) {
    return;
  }

  ctx.save();
  ctx.translate(x, y + wobble);
  ctx.rotate(rotation);

  ctx.fillStyle = 'rgba(0,0,0,0.34)';
  ctx.beginPath();
  ctx.ellipse(size * 0.08, size * 0.34, size * 0.86, size * 0.20, 0, 0, Math.PI * 2);
  ctx.fill();

  const beamAlpha = 0.16 + Math.sin(frame * 0.06 + seed) * 0.05;
  const beam = ctx.createLinearGradient(0, size * 0.10, 0, size * 1.18);
  beam.addColorStop(0, `rgba(216,182,255,${beamAlpha})`);
  beam.addColorStop(1, 'rgba(216,182,255,0)');
  ctx.fillStyle = beam;
  ctx.beginPath();
  ctx.moveTo(-size * 0.28, size * 0.08);
  ctx.lineTo(size * 0.28, size * 0.08);
  ctx.lineTo(size * 0.58, size * 1.08);
  ctx.lineTo(-size * 0.58, size * 1.08);
  ctx.closePath();
  ctx.fill();

  ctx.shadowColor = 'rgba(216,182,255,0.65)';
  ctx.shadowBlur = size * 0.24;
  ctx.fillStyle = '#d8b6ff';
  ctx.beginPath();
  ctx.ellipse(0, -size * 0.14, size * 0.38, size * 0.28, 0, Math.PI, Math.PI * 2);
  ctx.fill();

  ctx.shadowColor = 'rgba(0,0,0,0.38)';
  ctx.shadowBlur = size * 0.12;
  ctx.fillStyle = '#4c237f';
  ctx.beginPath();
  ctx.ellipse(0, size * 0.02, size * 0.84, size * 0.28, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.shadowBlur = 0;
  ctx.strokeStyle = '#e7a8ff';
  ctx.lineWidth = Math.max(2, size * 0.065);
  ctx.beginPath();
  ctx.ellipse(0, size * 0.00, size * 0.72, size * 0.20, 0, 0, Math.PI * 2);
  ctx.stroke();

  for (let i = 0; i < 3; i++) {
    const lx = (i - 1) * size * 0.34;
    const blink = 0.45 + Math.sin(frame * 0.11 + seed + i) * 0.35;
    ctx.globalAlpha = blink;
    ctx.fillStyle = i === 1 ? '#fff296' : '#ff4e9c';
    ctx.beginPath();
    ctx.arc(lx, size * 0.05, size * 0.065, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

function drawCoin(x, y, size, special = false) {
  // Basic coins use coin_basic.png; rare special coins keep the animated red sprite.
  const theme = currentTheme();
  const pulse = special ? 1 + Math.sin((frame + y) * 0.08) * 0.075 : 1;
  if (special) {
    const glow = 0.58 + Math.sin((frame + y) * 0.11) * 0.24;
    ctx.save();
    ctx.translate(x, y);
    ctx.globalAlpha = glow;
    ctx.fillStyle = '#ff453a';
    ctx.shadowColor = '#ff453a';
    ctx.shadowBlur = size * 0.68;
    ctx.beginPath();
    ctx.arc(0, 0, size * 0.66 * pulse, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  if (saintRing) {
    const ringPulse = 1 + Math.sin((frame + y) * 0.12) * 0.04;
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(ringPulse, ringPulse);
    ctx.shadowColor = 'rgba(255,242,150,0.72)';
    ctx.shadowBlur = size * 0.32;
    ctx.strokeStyle = '#fff296';
    ctx.lineWidth = Math.max(2, size * 0.07);
    ctx.beginPath();
    ctx.ellipse(0, -size * 0.02, size * 0.86, size * 0.32, -0.10, 0, Math.PI * 2);
    ctx.stroke();

    ctx.shadowBlur = size * 0.22;
    ctx.strokeStyle = 'rgba(216,182,255,0.82)';
    ctx.lineWidth = Math.max(1, size * 0.032);
    ctx.beginPath();
    ctx.arc(0, 0, size * 0.76, -0.25, Math.PI + 0.48);
    ctx.stroke();
    ctx.restore();
  }

  const spriteName = special ? 'coin_red' : 'coin_basic';
  const spriteH = size * 1.10 * pulse;
  const spriteW = special ? size * 1.66 * pulse : spriteH * spriteAspect('coin_basic', 668 / 685);
  if (drawSprite(spriteName, x, y, spriteW, spriteH, {
    shadowColor: 'rgba(0,0,0,0.38)',
    shadowBlur: size * 0.18,
    shadowOffsetY: size * 0.10
  })) {
    return;
  }

  ctx.save();
  ctx.translate(x, y);
  ctx.scale(pulse, pulse);
  const s = size * 0.72;

  // Outer circular body
  ctx.shadowColor = 'rgba(0,0,0,0.34)';
  ctx.shadowBlur = size * 0.18;
  ctx.shadowOffsetY = size * 0.10;
  ctx.fillStyle   = special ? theme.obstacle : theme.coin1;
  ctx.strokeStyle = special ? theme.obstacleStroke : theme.coinStroke;
  ctx.lineWidth   = 2.5;
  ctx.beginPath();
  ctx.arc(0, 0, s, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  // Inner circular highlight
  ctx.shadowBlur = 0;
  ctx.shadowOffsetY = 0;
  const coinGradient = ctx.createRadialGradient(-s * 0.18, -s * 0.22, s * 0.12, 0, 0, s * 0.55);
  coinGradient.addColorStop(0, theme.coinStar);
  coinGradient.addColorStop(0.45, special ? theme.obstacleStroke : theme.coin0);
  coinGradient.addColorStop(1, special ? theme.obstacle : theme.coin1);
  ctx.fillStyle = coinGradient;
  ctx.beginPath();
  ctx.arc(0, 0, s * 0.45, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawPortalCollapse(effect) {
  const progress = Math.min(effect.age / effect.duration, 1);
  const eased = 1 - Math.pow(1 - progress, 3);
  const scale = Math.max(0.02, 1 - eased);
  const palette = CAR_PALETTES[effect.color] || CAR_PALETTES.blue;

  ctx.save();
  ctx.translate(effect.x, effect.y);
  ctx.scale(scale, scale);
  ctx.globalAlpha = 1 - progress;
  drawPortal(0, 0, effect.size, effect.color, effect.seed);

  ctx.globalAlpha = 0.85 * (1 - progress);
  ctx.fillStyle = palette.body;
  ctx.shadowColor = palette.body;
  ctx.shadowBlur = effect.size * 0.5;
  ctx.beginPath();
  ctx.arc(0, 0, effect.size * 0.16, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawCoinPop(effect) {
  const theme = currentTheme();
  const special = effect.color === 'red';
  const progress = Math.min(effect.age / effect.duration, 1);
  const eased = 1 - Math.pow(1 - progress, 2);
  const alpha = 1 - progress;
  const radius = effect.size * (0.50 + eased * (special ? 1.75 : 1.15));

  ctx.save();
  ctx.translate(effect.x, effect.y - progress * effect.size * 0.5);
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = special ? '#ff453a' : theme.hudAccent;
  ctx.lineWidth = Math.max(2, effect.size * 0.06 * alpha);
  ctx.shadowColor = special ? 'rgba(255,69,58,0.75)' : 'transparent';
  ctx.shadowBlur = special ? effect.size * 0.30 : 0;
  ctx.beginPath();
  ctx.arc(0, 0, radius, 0, Math.PI * 2);
  ctx.stroke();

  ctx.shadowBlur = 0;
  ctx.fillStyle = special ? '#fff296' : theme.coinStar;
  const sparkCount = special ? 8 : 5;
  for (let i = 0; i < sparkCount; i++) {
    const angle = (Math.PI * 2 / sparkCount) * i + progress * (special ? 1.25 : 0.8);
    const sparkR = effect.size * (0.25 + progress * (special ? 1.15 : 0.85));
    ctx.beginPath();
    ctx.arc(Math.cos(angle) * sparkR, Math.sin(angle) * sparkR, effect.size * (special ? 0.070 : 0.055) * alpha, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

function drawSaintRing(x, y, size, alpha = 1) {
  const pulse = 1 + Math.sin(frame * 0.12) * 0.045;
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(pulse, pulse);
  ctx.globalAlpha = alpha;
  ctx.shadowColor = 'rgba(255,242,150,0.80)';
  ctx.shadowBlur = size * 0.24;
  ctx.strokeStyle = '#fff296';
  ctx.lineWidth = Math.max(2, size * 0.075);
  ctx.beginPath();
  ctx.ellipse(0, 0, size * 0.50, size * 0.22, -0.08, 0, Math.PI * 2);
  ctx.stroke();

  ctx.shadowBlur = 0;
  ctx.strokeStyle = 'rgba(255,255,255,0.76)';
  ctx.lineWidth = Math.max(1, size * 0.025);
  ctx.beginPath();
  ctx.ellipse(0, 0, size * 0.36, size * 0.14, -0.08, 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();
}

function drawSaintRingGain(effect) {
  const progress = Math.min(effect.age / effect.duration, 1);
  const alpha = 1 - progress;
  const rise = effect.size * progress * 0.88;
  drawSaintRing(effect.x, effect.y - rise, effect.size * (1 + progress * 0.55), alpha);
}

function drawSaintRingBreak(effect) {
  const progress = Math.min(effect.age / effect.duration, 1);
  const alpha = 1 - progress;
  const radius = effect.size * (0.45 + progress * 1.55);

  ctx.save();
  ctx.translate(effect.x, effect.y);
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = '#fff296';
  ctx.lineWidth = Math.max(2, effect.size * 0.07 * alpha);
  ctx.shadowColor = 'rgba(255,242,150,0.65)';
  ctx.shadowBlur = effect.size * 0.22;
  for (let i = 0; i < 8; i++) {
    const angle = (Math.PI * 2 / 8) * i + progress * 0.6;
    const inner = radius * 0.35;
    const outer = radius;
    ctx.beginPath();
    ctx.moveTo(Math.cos(angle) * inner, Math.sin(angle) * inner);
    ctx.lineTo(Math.cos(angle) * outer, Math.sin(angle) * outer);
    ctx.stroke();
  }
  ctx.restore();
}

function drawPortal(x, y, size, color, seed = 0) {
  const palette = CAR_PALETTES[color] || CAR_PALETTES.blue;
  const portalSeed = seed || COLOR_ORDER.indexOf(color) * 1009 + 17;
  const innerGlowColor = color === 'white' ? '#ffffff' : palette.body;
  const pulse = 0.68 + Math.sin(frame * 0.075 + portalSeed * 0.01) * 0.18;
  const drift = frame * 0.008 + portalSeed * 0.003;
  const outerRx = size * 0.56;
  const outerRy = size * 0.94;
  const innerRx = size * 0.37;
  const innerRy = size * 0.66;

  ctx.save();
  ctx.translate(x, y);

  // Road contact shadow.
  ctx.fillStyle = 'rgba(0,0,0,0.26)';
  ctx.beginPath();
  ctx.ellipse(size * 0.03, size * 0.72, size * 0.68, size * 0.16, 0, 0, Math.PI * 2);
  ctx.fill();

  // Slow-drifting particles around the ring.
  for (let i = 0; i < 18; i++) {
    const pSeed = portalSeed + i * 31;
    const baseAngle = pseudoRandom(pSeed) * Math.PI * 2;
    const speed = 0.45 + pseudoRandom(pSeed + 1) * 0.55;
    const angle = baseAngle + drift * speed;
    const radius = 0.88 + pseudoRandom(pSeed + 2) * 0.36;
    const px = Math.cos(angle) * outerRx * radius;
    const py = Math.sin(angle) * outerRy * radius;
    const particleSize = size * (0.025 + pseudoRandom(pSeed + 3) * 0.035);
    const fade = 0.50 + Math.sin(frame * (0.025 + pseudoRandom(pSeed + 4) * 0.025) + pSeed) * 0.50;
    const alpha = (0.14 + pseudoRandom(pSeed + 5) * 0.54) * fade;
    const isSquare = pseudoRandom(pSeed + 6) > 0.48;

    ctx.save();
    ctx.translate(px, py);
    ctx.rotate(angle + frame * 0.012);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = alphaHex(palette.body, 0.95);
    ctx.shadowColor = alphaHex(palette.body, 0.65);
    ctx.shadowBlur = size * 0.12;
    ctx.beginPath();
    if (isSquare) {
      ctx.roundRect(-particleSize / 2, -particleSize / 2, particleSize, particleSize, particleSize * 0.18);
    } else {
      ctx.arc(0, 0, particleSize * 0.55, 0, Math.PI * 2);
    }
    ctx.fill();
    ctx.restore();
  }

  // Soft outer glow with falloff.
  const glow = ctx.createRadialGradient(0, 0, size * 0.26, 0, 0, size * 1.22);
  glow.addColorStop(0, alphaHex(palette.body, 0.00));
  glow.addColorStop(0.46, alphaHex(palette.body, 0.15 * pulse));
  glow.addColorStop(0.72, alphaHex(palette.body, 0.09 * pulse));
  glow.addColorStop(1, alphaHex(palette.body, 0.00));
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.ellipse(0, 0, size * 1.02, size * 1.36, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.shadowColor = alphaHex(palette.body, 0.88);
  ctx.shadowBlur = size * (0.42 + pulse * 0.20);
  ctx.strokeStyle = palette.body;
  ctx.lineWidth = Math.max(4, size * 0.18);
  ctx.beginPath();
  ctx.ellipse(0, 0, outerRx, outerRy, 0, 0, Math.PI * 2);
  ctx.stroke();

  ctx.globalAlpha = 0.48 + pulse * 0.34;
  ctx.shadowBlur = size * 0.22;
  ctx.strokeStyle = alphaHex(palette.head || palette.body, 0.85);
  ctx.lineWidth = Math.max(2, size * 0.055);
  ctx.beginPath();
  ctx.ellipse(0, 0, outerRx * 0.87, outerRy * 0.87, 0, 0, Math.PI * 2);
  ctx.stroke();

  // Sharper inner ring. The center stays transparent so the car remains visible.
  ctx.globalAlpha = 1;
  ctx.shadowColor = alphaHex(innerGlowColor, 0.42);
  ctx.shadowBlur = size * 0.10;
  ctx.strokeStyle = palette.roof;
  ctx.lineWidth = Math.max(2, size * 0.07);
  ctx.beginPath();
  ctx.ellipse(0, 0, innerRx, innerRy, 0, 0, Math.PI * 2);
  ctx.stroke();

  ctx.shadowBlur = 0;
  ctx.strokeStyle = alphaHex(innerGlowColor, color === 'white' ? 0.45 : 0.26);
  ctx.lineWidth = Math.max(1, size * 0.025);
  ctx.beginPath();
  ctx.ellipse(0, 0, innerRx * 0.82, innerRy * 0.82, 0, 0, Math.PI * 2);
  ctx.stroke();

  ctx.restore();
}

function drawCar(cx, cy, carW, carH, color = selectedCarColor) {
  const palette = CAR_PALETTES[color] || CAR_PALETTES.blue;
  const spriteName = `car_${color}`;
  ctx.save();
  ctx.translate(cx, cy);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath();
  ctx.ellipse(4, 6, carW * 0.45, carH * 0.22, 0, 0, Math.PI * 2);
  ctx.fill();

  if (spriteReady(spriteName)) {
    ctx.shadowColor = 'rgba(0,0,0,0.36)';
    ctx.shadowBlur = carW * 0.22;
    ctx.shadowOffsetY = carH * 0.025;
    ctx.drawImage(sprites[spriteName], -carW / 2, -carH / 2, carW, carH);
    ctx.restore();
    return;
  }

  // Body
  ctx.fillStyle = palette.body;
  ctx.beginPath();
  ctx.roundRect(-carW / 2, -carH / 2, carW, carH, carW * 0.18);
  ctx.fill();

  // Roof
  const rfW = carW * 0.68, rfH = carH * 0.44;
  const rfX = -rfW / 2, rfY = -carH / 2 + carH * 0.10;
  ctx.fillStyle = palette.roof;
  ctx.beginPath();
  ctx.roundRect(rfX, rfY, rfW, rfH, carW * 0.12);
  ctx.fill();

  // Windshield (front – top in top-down)
  ctx.fillStyle = palette.glass;
  ctx.beginPath();
  ctx.roundRect(-carW * 0.27, -carH / 2 + carH * 0.12, carW * 0.54, carH * 0.20, 4);
  ctx.fill();

  // Rear window
  ctx.fillStyle = palette.glass2;
  ctx.beginPath();
  ctx.roundRect(-carW * 0.27, -carH / 2 + carH * 0.36, carW * 0.54, carH * 0.13, 4);
  ctx.fill();

  // Headlights (top)
  ctx.fillStyle = palette.head;
  ctx.beginPath();
  ctx.roundRect(-carW * 0.42, -carH / 2 + carH * 0.03, carW * 0.18, carH * 0.07, 2);
  ctx.fill();
  ctx.beginPath();
  ctx.roundRect( carW * 0.24, -carH / 2 + carH * 0.03, carW * 0.18, carH * 0.07, 2);
  ctx.fill();

  // Tail-lights (bottom)
  ctx.fillStyle = palette.tail;
  ctx.beginPath();
  ctx.roundRect(-carW * 0.42, carH / 2 - carH * 0.10, carW * 0.18, carH * 0.07, 2);
  ctx.fill();
  ctx.beginPath();
  ctx.roundRect( carW * 0.24, carH / 2 - carH * 0.10, carW * 0.18, carH * 0.07, 2);
  ctx.fill();

  ctx.restore();
}

function drawHUD() {
  const theme = currentTheme();
  const fSize = Math.max(14, canvas.height * 0.033);
  const label = 'SCORE ';
  const value = String(score);
  const fontFamily = '"Arial Black", "Trebuchet MS", Arial, sans-serif';
  const y = canvas.height * 0.052;

  ctx.save();
  ctx.font = `900 ${fSize}px ${fontFamily}`;
  const labelW = ctx.measureText(label).width;
  const valueW = ctx.measureText(value).width;
  const padX = canvas.width * 0.045;
  const pillW = Math.max(canvas.width * 0.38, labelW + valueW + padX * 2);
  const pillH = Math.max(30, fSize * 1.65);
  const pillX = canvas.width / 2 - pillW / 2;
  const pillY = y - pillH * 0.52;

  ctx.shadowColor = 'rgba(0,0,0,0.34)';
  ctx.shadowBlur = canvas.width * 0.022;
  ctx.shadowOffsetY = 2;
  ctx.fillStyle = theme.hudPanel;
  ctx.beginPath();
  ctx.roundRect(pillX, pillY, pillW, pillH, pillH / 2);
  ctx.fill();

  ctx.shadowBlur = 0;
  ctx.shadowOffsetY = 0;
  ctx.strokeStyle = 'rgba(255,255,255,0.14)';
  ctx.lineWidth = 1;
  ctx.stroke();

  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = theme.hud;
  ctx.fillText(label, pillX + padX, y);
  ctx.fillStyle = theme.hudAccent;
  ctx.fillText(value, pillX + padX + labelW, y);
  ctx.restore();

  drawColorStatus();
  drawSaintRingStatus();
}

function drawMissionSymbol(centerX, centerY, radius, activeColors = []) {
  const activeSet = new Set(activeColors);
  const gap = radius * 2.35;
  const positions = {
    blue:   { x: centerX, y: centerY - gap * 0.40 },
    white:  { x: centerX - gap * 0.50, y: centerY + gap * 0.46 },
    purple: { x: centerX + gap * 0.50, y: centerY + gap * 0.46 }
  };

  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.18)';
  ctx.lineWidth = Math.max(1, radius * 0.12);
  ctx.beginPath();
  ctx.moveTo(positions.blue.x, positions.blue.y);
  ctx.lineTo(positions.white.x, positions.white.y);
  ctx.lineTo(positions.purple.x, positions.purple.y);
  ctx.closePath();
  ctx.stroke();

  for (const color of COLOR_ORDER) {
    const palette = CAR_PALETTES[color] || CAR_PALETTES.blue;
    const pos = positions[color];
    const unlocked = activeSet.has(color);
    const fillColor = color === 'white' ? '#f7f6ef' : palette.body;
    const strokeColor = unlocked ? fillColor : 'rgba(255,255,255,0.50)';

    ctx.globalAlpha = unlocked ? 1 : 0.74;
    ctx.shadowColor = unlocked ? alphaHex(fillColor, color === 'white' ? 0.72 : 0.64) : 'transparent';
    ctx.shadowBlur = unlocked ? radius * 1.05 : 0;
    ctx.fillStyle = unlocked ? fillColor : 'rgba(255,255,255,0.035)';
    ctx.strokeStyle = strokeColor;
    ctx.lineWidth = unlocked ? Math.max(2, radius * 0.28) : Math.max(1, radius * 0.18);
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, unlocked ? radius * 1.02 : radius * 0.92, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    if (unlocked) {
      ctx.shadowBlur = 0;
      ctx.globalAlpha = color === 'white' ? 0.60 : 0.42;
      ctx.fillStyle = color === 'white' ? '#ffffff' : '#ffffff';
      ctx.beginPath();
      ctx.arc(pos.x - radius * 0.25, pos.y - radius * 0.25, radius * 0.26, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.restore();
}

function orderedColorPreview() {
  const idx = COLOR_ORDER.indexOf(selectedCarColor);
  const safeIdx = idx === -1 ? 0 : idx;
  return [
    COLOR_ORDER[(safeIdx + 1) % COLOR_ORDER.length],
    COLOR_ORDER[safeIdx],
    COLOR_ORDER[(safeIdx - 1 + COLOR_ORDER.length) % COLOR_ORDER.length]
  ];
}

function drawColorStatus() {
  if (gameState !== 'playing' || dreamHighway || !colorFeatureUnlocked()) return;

  const chipR = Math.max(7, canvas.width * 0.020);
  const gap = chipR * 2.55;
  const x = canvas.width - canvas.width * 0.065;
  const y = canvas.height * 0.095;
  const colors = orderedColorPreview();
  const theme = currentTheme();

  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.30)';
  ctx.shadowBlur = chipR * 1.2;
  ctx.shadowOffsetY = 1.5;
  ctx.fillStyle = theme.hudPanel;
  ctx.beginPath();
  ctx.roundRect(x - chipR * 1.55, y - gap - chipR * 1.45, chipR * 3.1, gap * 2 + chipR * 2.9, chipR * 0.9);
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.shadowOffsetY = 0;
  ctx.strokeStyle = 'rgba(255,255,255,0.14)';
  ctx.lineWidth = 1;
  ctx.stroke();

  for (let i = 0; i < colors.length; i++) {
    const color = colors[i];
    const palette = CAR_PALETTES[color];
    const cy = y + (i - 1) * gap;
    const active = color === selectedCarColor;
    ctx.globalAlpha = active ? 1 : 0.76;
    ctx.shadowColor = active ? palette.body : 'transparent';
    ctx.shadowBlur = active ? chipR * 1.15 : 0;
    ctx.fillStyle = palette.body;
    ctx.strokeStyle = active ? '#ffffff' : 'rgba(255,255,255,0.45)';
    ctx.lineWidth = active ? 3 : 1.4;
    ctx.beginPath();
    ctx.arc(x, cy, active ? chipR * 1.12 : chipR, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
  }
  ctx.restore();
}

function drawSaintRingStatus() {
  if (gameState !== 'playing' || !saintRing) return;

  const size = Math.max(16, canvas.width * 0.050);
  const x = canvas.width * 0.070;
  const y = canvas.height * 0.128;
  const theme = currentTheme();

  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.30)';
  ctx.shadowBlur = size * 0.65;
  ctx.shadowOffsetY = 1.5;
  ctx.fillStyle = theme.hudPanel;
  ctx.beginPath();
  ctx.roundRect(x - size * 0.72, y - size * 0.58, size * 1.44, size * 1.16, size * 0.36);
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.shadowOffsetY = 0;
  ctx.strokeStyle = 'rgba(255,255,255,0.14)';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.restore();

  drawSaintRing(x, y, size * 0.95, 1);
}

function drawMenu(r) {
  ctx.fillStyle = 'rgba(0,0,0,0.60)';
  ctx.fillRect(0, 0, r.W, r.H);

  const cx   = r.W / 2;
  const fBig = Math.max(20, r.H * 0.070);
  const fMid = Math.max(14, r.H * 0.038);
  const fSm  = Math.max(12, r.H * 0.030);

  ctx.textAlign = 'center';

  // Title
  ctx.font      = `bold ${fBig}px Arial, sans-serif`;
  ctx.fillStyle = '#ffd700';
  ctx.fillText('LANE DODGER', cx, r.H * 0.22);

  drawMissionSymbol(cx, r.H * 0.315, Math.max(10, r.W * 0.034), []);

  // Instructions
  ctx.font      = `${fMid}px Arial, sans-serif`;
  ctx.fillStyle = '#dddddd';
  ctx.fillText('Tap left or right to steer', cx, r.H * 0.405);

  // Legend items
  const iconY1 = r.H * 0.500;
  const iconY2 = r.H * 0.580;
  const iconS  = r.H * 0.028;

  drawObstacle(cx - r.W * 0.20, iconY1, iconS * 1.2);
  ctx.font      = `${fSm}px Arial, sans-serif`;
  ctx.fillStyle = '#ffaaaa';
  ctx.textAlign = 'left';
  ctx.fillText('Avoid — game over on hit', cx - r.W * 0.10, iconY1 + iconS * 0.4);

  drawCoin(cx - r.W * 0.20, iconY2, iconS * 1.2);
  ctx.fillStyle = '#ffd700';
  ctx.fillText('Collect — +10 points', cx - r.W * 0.10, iconY2 + iconS * 0.4);

  if (highScore > 0) {
    ctx.textAlign = 'center';
    ctx.font      = `${fSm}px Arial, sans-serif`;
    ctx.fillStyle = '#aaaaff';
    ctx.fillText(`Best: ${highScore}`, cx, r.H * 0.64);
  }

  // Pulsing button
  const pulse = 0.94 + 0.06 * Math.sin(frame * 0.06);
  ctx.save();
  ctx.translate(cx, r.H * 0.78);
  ctx.scale(pulse, pulse);
  const btnW = r.W * 0.56, btnH = r.H * 0.10;
  ctx.fillStyle = '#27ae60';
  ctx.beginPath();
  ctx.roundRect(-btnW / 2, -btnH / 2, btnW, btnH, btnH * 0.3);
  ctx.fill();
  ctx.font      = `bold ${fMid * 1.1}px Arial, sans-serif`;
  ctx.fillStyle = '#ffffff';
  ctx.textAlign = 'center';
  ctx.fillText('TAP TO START', 0, fMid * 0.38);
  ctx.restore();

  ctx.font = `${Math.max(9, r.H * 0.018)}px Arial, sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.textAlign = 'center';
  ctx.fillText(GAME_VERSION, cx, r.H * 0.91);
}

function nightFlickerAlpha() {
  // Fast, irregular bulb-like stutters: x---x---x---xx-x-O.
  const flickerPattern = [0.72, 0.18, 0.06, 0.10, 0.66, 0.08, 0.18, 0.05, 0.78, 0.12, 0.07, 0.20, 0.64, 0.76, 0.14, 0.70, 0.10, 0.24, 0.86];
  const step = Math.floor(nightPhaseTimer / NIGHT_BLINK_FRAMES) % flickerPattern.length;
  return flickerPattern[step];
}

function drawNightOverlay(r, carCx, carCy, carW, carH) {
  if (activeWorld !== 'white' || nightPhase === 'idle') return;

  const alpha = nightPhase === 'night' ? 0.86 : nightFlickerAlpha();
  if (alpha <= 0) return;

  ctx.save();
  ctx.fillStyle = `rgba(1,3,12,${alpha})`;
  ctx.fillRect(0, 0, r.W, r.H);

  // Reveal only tight headlight glows plus a short, weak spill in front of the car.
  ctx.globalCompositeOperation = 'destination-out';
  const headlightY = carCy - carH / 2 + carH * 0.065;
  const lightPositions = [carCx - carW * 0.33, carCx + carW * 0.33];
  for (const lightX of lightPositions) {
    const lightGlow = ctx.createRadialGradient(lightX, headlightY, carW * 0.04, lightX, headlightY - carH * 0.11, carW * 0.46);
    lightGlow.addColorStop(0, 'rgba(255,255,255,0.96)');
    lightGlow.addColorStop(0.46, 'rgba(255,255,255,0.36)');
    lightGlow.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = lightGlow;
    ctx.beginPath();
    ctx.ellipse(lightX, headlightY - carH * 0.06, carW * 0.34, carH * 0.16, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  const frontSpill = ctx.createRadialGradient(carCx, headlightY, carW * 0.10, carCx, headlightY - carH * 0.36, carW * 0.95);
  frontSpill.addColorStop(0, 'rgba(255,255,255,0.42)');
  frontSpill.addColorStop(0.38, 'rgba(255,255,255,0.16)');
  frontSpill.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = frontSpill;
  ctx.beginPath();
  ctx.ellipse(carCx, headlightY - carH * 0.22, carW * 0.72, carH * 0.34, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.globalCompositeOperation = 'source-over';
  const glowAlpha = nightPhase === 'night' ? 0.20 : Math.max(0.10, alpha * 0.26);
  ctx.fillStyle = `rgba(255,245,170,${glowAlpha})`;
  for (const lightX of lightPositions) {
    ctx.beginPath();
    ctx.ellipse(lightX, headlightY - carH * 0.06, carW * 0.24, carH * 0.10, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

function drawVerticalSwipeIcon(x, y, size) {
  ctx.save();
  ctx.translate(x, y);
  ctx.strokeStyle = '#ffffff';
  ctx.fillStyle = '#ffffff';
  ctx.lineWidth = Math.max(3, size * 0.08);
  ctx.lineCap = 'round';

  ctx.beginPath();
  ctx.moveTo(0, -size * 0.46);
  ctx.lineTo(0, size * 0.46);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(0, -size * 0.54);
  ctx.lineTo(-size * 0.18, -size * 0.34);
  ctx.lineTo(size * 0.18, -size * 0.34);
  ctx.closePath();
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(0, size * 0.54);
  ctx.lineTo(-size * 0.18, size * 0.34);
  ctx.lineTo(size * 0.18, size * 0.34);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

function drawMissionModalPanel(r, activeColors, accentColor = '#ffffff') {
  ctx.fillStyle = 'rgba(0,0,0,0.68)';
  ctx.fillRect(0, 0, r.W, r.H);
  const cx = r.W / 2;
  const boxW = r.W * 0.68;
  const boxH = r.H * 0.28;
  const boxY = r.H * 0.36;
  ctx.fillStyle = 'rgba(20,24,35,0.96)';
  ctx.strokeStyle = accentColor;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.roundRect(cx - boxW / 2, boxY, boxW, boxH, 18);
  ctx.fill();
  ctx.stroke();

  drawMissionSymbol(cx, boxY + boxH * 0.22, Math.max(10, r.W * 0.032), activeColors);
  return { cx, boxW, boxH, boxY };
}

function drawColorIntroModal(r) {
  const { cx, boxW, boxH, boxY } = drawMissionModalPanel(r, ['blue'], CAR_PALETTES.blue.body);
  const carW = boxW * 0.25;
  const carH = carW * 1.85;

  drawVerticalSwipeIcon(cx + boxW * 0.22, boxY + boxH * 0.62, boxH * 0.45);
}

function drawSaintRingMissionModal(r) {
  const { cx, boxW, boxH, boxY } = drawMissionModalPanel(r, ['blue', 'white'], '#f7f6ef');
  const carW = boxW * 0.23;
  const carH = carW * 1.85;

  drawCar(cx, carY, carW, carH, 'white');

function drawSpaceMissionModal(r) {
  const { cx, boxH, boxY } = drawMissionModalPanel(r, ['blue', 'white', 'purple'], CAR_PALETTES.purple.body);
  const portalY = boxY + boxH * 0.64;
  drawPortal(cx, portalY, boxH * 0.23, 'purple', 7301);
}

function drawPausedModal(r) {
  if (pauseReason === 'whiteMission') {
    drawSaintRingMissionModal(r);
    return;
  }
  if (pauseReason === 'purpleMission') {
    drawSpaceMissionModal(r);
    return;

}

function drawGameOver(r) {
  ctx.fillStyle = 'rgba(0,0,0,0.72)';
  ctx.fillRect(0, 0, r.W, r.H);

  const cx   = r.W / 2;
  const fBig = Math.max(20, r.H * 0.075);
  const fMid = Math.max(14, r.H * 0.050);
  const fSm  = Math.max(12, r.H * 0.032);

  ctx.textAlign = 'center';

  ctx.font      = `bold ${fBig}px Arial, sans-serif`;
  ctx.fillStyle = '#ff4444';
  ctx.fillText('GAME OVER', cx, r.H * 0.36);

  ctx.font      = `${fMid}px Arial, sans-serif`;
  ctx.fillStyle = '#ffffff';
  ctx.fillText(`Score: ${score}`, cx, r.H * 0.48);

  if (score >= highScore) {
    ctx.font      = `bold ${fSm * 1.1}px Arial, sans-serif`;
    ctx.fillStyle = '#ffd700';
    ctx.fillText('🏆 NEW HIGH SCORE!', cx, r.H * 0.57);
  } else {
    ctx.font      = `${fSm}px Arial, sans-serif`;
    ctx.fillStyle = '#aaaaff';
    ctx.fillText(`Best: ${highScore}`, cx, r.H * 0.57);
  }

  ctx.font      = `${fSm}px Arial, sans-serif`;
  ctx.fillStyle = '#cccccc';
  ctx.fillText('Tap to return to menu', cx, r.H * 0.72);
}

// ─── Main Render ─────────────────────────────────────────────────────────────

function draw() {
  const r = roadMetrics();

  // Clear
  ctx.clearRect(0, 0, r.W, r.H);

  if (dreamHighway) {
    drawSpaceBackground(r);
  } else {
    drawBackground(r);
    drawRoad(r);
  }

  // Game objects
  for (const obj of objects) {
    if (obj.type === 'obstacle') drawObstacle(obj.x, obj.y, obj.size);
    else if (obj.type === 'ufo') drawUfo(obj.x, obj.y, obj.size, obj.rotation || 0, obj.seed || 0);
    else if (obj.type === 'collect') drawCoin(obj.x, obj.y, obj.size, !!obj.special);
    else if (obj.type === 'portal')  drawPortal(obj.x, obj.y, obj.size, obj.color, obj.seed);
  }

  for (const effect of effects) {
    if (effect.type === 'portalCollapse') drawPortalCollapse(effect);
    else if (effect.type === 'coinPop') drawCoinPop(effect);
    else if (effect.type === 'saintRingGain') drawSaintRingGain(effect);
    else if (effect.type === 'saintRingBreak') drawSaintRingBreak(effect);
  }

  // Player car
  const { carW, carH, carY } = carDims();
  drawCar(carX, carY, carW, carH);
  if (!dreamHighway) drawNightOverlay(r, carX, carY, carW, carH);
  if (saintRing && !dreamHighway) drawSaintRing(carX, carY - carH * 0.56, carW * 0.76, 0.95);

  if (gameState === 'playing') {
    drawHUD();
  } else if (gameState === 'paused') {
    drawHUD();
    drawPausedModal(r);
  } else if (gameState === 'menu') {
    drawHUD();
    drawMenu(r);
  } else if (gameState === 'gameover') {
    drawHUD();
    drawGameOver(r);
  }
}

// ─── Input ───────────────────────────────────────────────────────────────────

function handleTap() {
  if (gameState === 'paused') {
    if (!canCloseMissionModal()) return;
    const closedReason = pauseReason;
    gameState = 'playing';
    pauseReason = null;
    if (closedReason === 'purpleMission') startDreamHighway();
    return;
  }
  if (gameState === 'menu') {
    gameState = 'playing';
    initGame();
    return;
  }
  if (gameState === 'gameover') {
    gameState = 'menu';
    dreamHighway = false;
    activeWorld = 'blue';
    selectedCarColor = 'blue';
    objects = [];
    effects = [];
    return;
  }
  if (gameState === 'playing') {
    if (dreamHighway) return;
    setPlayerLane(playerLane === 0 ? 1 : 0);
  }
}

function setPlayerLane(lane) {
  playerLane = lane;
  const r = roadMetrics();
  targetCarX = playerLane === 0 ? r.lane0 : r.lane1;
}

function moveByScreenSide(point) {
  if (dreamHighway) {
    setDreamTargetX(point.x);
    return;
  }
  setPlayerLane(point.x < canvas.width / 2 ? 0 : 1);
}

function setDreamTargetX(x) {
  targetCarX = clampDreamX(x);
}

function isChangingLane() {
  if (dreamHighway) return false;
  return Math.abs(carX - targetCarX) > 1;
}

function reverseLaneChangeFromPoint(point) {
  if (gameState !== 'playing' || !isChangingLane()) return;
  const lane = point.x < canvas.width / 2 ? 0 : 1;
  if (lane !== playerLane) setPlayerLane(lane);
}

function canvasPoint(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (clientX - rect.left) * (canvas.width / rect.width),
    y: (clientY - rect.top) * (canvas.height / rect.height)
  };
}

function colorSwipeDirection(start, end) {
  const dx = end.x - start.x;
  const dy = end.y - start.y;
  const minDist = Math.max(34, canvas.height * COLOR_SWIPE_MIN_FRAC);
  if (Math.abs(dy) < minDist || Math.abs(dy) <= Math.abs(dx) * 1.25) return 0;
  return dy < 0 ? 1 : -1;
}

function handlePointerPress(point) {
  if (gameState === 'paused') {
    handleTap();
    return;
  }

  if (gameState === 'menu' || gameState === 'gameover') {
    handleTap();
    return;
  }

  if (gameState === 'playing') {
    moveByScreenSide(point);
  }
}

function handleTouchEnd(start, end) {
  if (gameState === 'paused') {
    handleTap();
    return;
  }

  if (gameState === 'menu' || gameState === 'gameover') {
    handleTap();
    return;
  }

  if (gameState === 'playing') {
    if (dreamHighway) {
      setDreamTargetX(end.x);
      return;
    }
    const swipeDirection = colorSwipeDirection(start, end);
    if (swipeDirection !== 0 && colorFeatureUnlocked()) {
      cycleCarColor(swipeDirection);
      return;
    }
    moveByScreenSide(end);
  }
}

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  lastTouchTime = Date.now();
  const touch = e.changedTouches[0];
  touchStartPoint = canvasPoint(touch.clientX, touch.clientY);
  if (gameState === 'playing' && dreamHighway) {
    setDreamTargetX(touchStartPoint.x);
    return;
  }
  reverseLaneChangeFromPoint(touchStartPoint);
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  lastTouchTime = Date.now();
  if (gameState !== 'playing' || !dreamHighway) return;
  const touch = e.changedTouches[0];
  const point = canvasPoint(touch.clientX, touch.clientY);
  setDreamTargetX(point.x);
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  lastTouchTime = Date.now();
  const touch = e.changedTouches[0];
  const endPoint = canvasPoint(touch.clientX, touch.clientY);
  handleTouchEnd(touchStartPoint || endPoint, endPoint);
  touchStartPoint = null;
}, { passive: false });

canvas.addEventListener('touchcancel', () => {
  touchStartPoint = null;
}, { passive: false });

canvas.addEventListener('click', (e) => {
  if (Date.now() - lastTouchTime < 500) return;
  const point = canvasPoint(e.clientX, e.clientY);
  handlePointerPress(point);
});

canvas.addEventListener('mousedown', (e) => {
  if (Date.now() - lastTouchTime < 500) return;
  const point = canvasPoint(e.clientX, e.clientY);
  if (gameState === 'playing' && dreamHighway) {
    mouseSteeringActive = true;
    setDreamTargetX(point.x);
    return;
  }
  reverseLaneChangeFromPoint(point);
});

canvas.addEventListener('mousemove', (e) => {
  if (!mouseSteeringActive || gameState !== 'playing' || !dreamHighway) return;
  const point = canvasPoint(e.clientX, e.clientY);
  setDreamTargetX(point.x);
});

window.addEventListener('mouseup', () => {
  mouseSteeringActive = false;
});

window.addEventListener('blur', () => {
  mouseSteeringActive = false;
});

window.addEventListener('keydown', (e) => {
  if (e.key === ' ' && gameState === 'playing' && !dreamHighway && colorFeatureUnlocked()) {
    e.preventDefault();
    cycleCarColor();
    return;
  }

  if (e.key === 'ArrowLeft') {
    e.preventDefault();
    if (gameState === 'playing' && dreamHighway) setDreamTargetX(targetCarX - canvas.width * 0.18);
    else if (gameState === 'playing') setPlayerLane(0);
    else handleTap();
    return;
  }

  if (e.key === 'ArrowRight') {
    e.preventDefault();
    if (gameState === 'playing' && dreamHighway) setDreamTargetX(targetCarX + canvas.width * 0.18);
    else if (gameState === 'playing') setPlayerLane(1);
    else handleTap();
    return;
  }

  if (['ArrowUp',' ','Enter'].includes(e.key)) {
    e.preventDefault();
    handleTap();
  }
});

// ─── Game Loop ───────────────────────────────────────────────────────────────

function loop() {
  frame++;
  if (gameState === 'playing') update();
  else if (gameState !== 'paused') roadOffset += 1.5;    // animate road in menu/gameover background
  draw();
  requestAnimationFrame(loop);
}

// ─── Boot ────────────────────────────────────────────────────────────────────
gameState = devMode ? 'playing' : 'menu';
initGame();
loop();
</script>
</body>
</html>
