<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Lane Dodger</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100dvh;
      overflow: hidden;
    }
    canvas {
      display: block;
      touch-action: none;
    }
  </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
'use strict';

// ─── Canvas & Resize ────────────────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');

function resize() {
  // Portrait 9:16 ratio, fill the viewport
  const maxH = window.innerHeight;
  const maxW = window.innerWidth;
  const ratio = 9 / 16;
  let w = maxH * ratio;
  let h = maxH;
  if (w > maxW) { w = maxW; h = maxW / ratio; }
  canvas.width  = Math.floor(w);
  canvas.height = Math.floor(h);
  // Re-snap car after resize if already playing
  if (typeof carX !== 'undefined') {
    const r = roadMetrics();
    targetCarX = playerLane === 0 ? r.lane0 : r.lane1;
    carX = targetCarX;
  }
}
window.addEventListener('resize', resize);

// ─── roundRect polyfill (pre-Chrome-99 / pre-FF-112) ────────────────────────
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
    r = Math.min(r, w / 2, h / 2);
    this.beginPath();
    this.moveTo(x + r, y);
    this.lineTo(x + w - r, y);
    this.quadraticCurveTo(x + w, y,     x + w, y + r);
    this.lineTo(x + w, y + h - r);
    this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    this.lineTo(x + r, y + h);
    this.quadraticCurveTo(x, y + h,     x, y + h - r);
    this.lineTo(x, y + r);
    this.quadraticCurveTo(x, y,         x + r, y);
    this.closePath();
  };
}

// ─── Road Metrics ───────────────────────────────────────────────────────────
const GRASS_FRAC = 0.10; // fraction of canvas width for each grass strip

function roadMetrics() {
  const W = canvas.width, H = canvas.height;
  const grassW   = W * GRASS_FRAC;
  const roadL    = grassW;
  const roadR    = W - grassW;
  const roadW    = roadR - roadL;
  const laneW    = roadW / 2;
  const centerX  = roadL + roadW / 2;
  const lane0    = roadL + laneW / 2;        // left lane x-center
  const lane1    = roadL + laneW * 1.5;      // right lane x-center
  return { W, H, grassW, roadL, roadR, roadW, laneW, centerX, lane0, lane1 };
}

// ─── Game State ─────────────────────────────────────────────────────────────
let gameState;        // 'menu' | 'playing' | 'paused' | 'gameover'
let score, highScore = 0;
let frame;
let speed;
let playerLane;       // 0 = left, 1 = right
let carX, targetCarX;
let objects;          // [{ x, y, type, size, lane, color }]
let roadOffset;
let scoreTimer, spawnTimer, spawnInterval, diffTimer;
let portalTimer, portalInterval;
let nightTimer, nightInterval, nightPhaseTimer, nightPhase;
let selectedCarColor, activeWorld;
let colorIntroSeen, pauseReason;
let lastTouchTime = 0;
let touchStartPoint = null;

resize();

const queryParams = new URLSearchParams(window.location.search);
const requestedDevWorld = queryParams.get('world');
const devMode = queryParams.get('mode') === 'dev';
const CAR_Y_FRAC          = 0.78;
const LANE_LERP           = 0.14;
// 28 % coins, 72 % obstacles — coins are stronger, but rarer.
const COIN_SPAWN_PROBABILITY = 0.28;
const COIN_SPEED_BONUS   = 0.45;
const MAX_SPEED          = 16;
const OPPOSING_OBSTACLE_GAP_MULT = 1.3;
const COLOR_UNLOCK_SCORE = 10;
const COLOR_ORDER        = ['blue', 'white', 'purple'];
const devWorld = devMode && COLOR_ORDER.includes(requestedDevWorld) ? requestedDevWorld : null;
const PORTAL_MIN_INTERVAL = 20;
const PORTAL_MAX_INTERVAL = 120;
const PORTAL_SCORE_BONUS = 50;
const NIGHT_MIN_INTERVAL = 900;
const NIGHT_MAX_INTERVAL = 1800;
const NIGHT_WARNING_FRAMES = 180;
const NIGHT_DURATION_FRAMES = 300;
const NIGHT_BLINK_FRAMES = 24;
const COLOR_SWIPE_MIN_FRAC = 0.055;
// Hitbox is smaller than the visual to feel fair when near-missing
const COLLISION_SCALE     = 0.65;

const CAR_PALETTES = {
  blue:   { body: '#2980d9', roof: '#1a60a8', glass: 'rgba(190,235,255,0.85)', glass2: 'rgba(190,235,255,0.65)', head: '#ffffbb', tail: '#ff2200' },
  white:  { body: '#f7f6ef', roof: '#dfe9f7', glass: 'rgba(155,205,255,0.78)', glass2: 'rgba(155,205,255,0.56)', head: '#fff5bd', tail: '#ee665e' },
  purple: { body: '#7b35d6', roof: '#35105c', glass: 'rgba(218,166,255,0.78)', glass2: 'rgba(218,166,255,0.54)', head: '#eebcff', tail: '#ff3c8c' }
};

const WORLD_THEMES = {
  blue: {
    grass: '#2a5e22', grassDot: '#3a7a2e', road: '#3d3d3d', curb: '#e0b020', dash: '#ffffff',
    obstacle: '#e03020', obstacleStroke: '#ff6030', obstacleInner: '#ff8844',
    coin0: '#ffe060', coin1: '#f0a000', coinStroke: '#c08000', coinStar: '#c07800',
    hud: '#ffffff'
  },
  white: {
    grass: '#d9efff', grassDot: '#f8fbff', road: '#cfd9e8', curb: '#fff1a8', dash: '#fffdf4',
    obstacle: '#df766f', obstacleStroke: '#ffc4a4', obstacleInner: '#ffd4b0',
    coin0: '#fff4a8', coin1: '#eebf45', coinStroke: '#bb9240', coinStar: '#b17d20',
    hud: '#ffffff'
  },
  purple: {
    grass: '#170b25', grassDot: '#35204c', road: '#1e1727', curb: '#8d4dff', dash: '#d8b6ff',
    obstacle: '#9f144f', obstacleStroke: '#ff4e9c', obstacleInner: '#4a0a33',
    coin0: '#e7a8ff', coin1: '#8d4dff', coinStroke: '#4c237f', coinStar: '#260d4a',
    hud: '#f5dcff'
  }
};

function initGame() {
  const r    = roadMetrics();
  playerLane = 0;
  carX       = r.lane0;
  targetCarX = r.lane0;
  objects    = [];
  score      = 0;
  frame      = 0;
  speed      = 4;
  roadOffset = 0;
  scoreTimer = 0;
  spawnTimer = 0;
  spawnInterval = 68;
  diffTimer  = 0;
  portalTimer = 0;
  portalInterval = randomPortalInterval();
  nightTimer = 0;
  nightInterval = randomNightInterval();
  nightPhaseTimer = 0;
  nightPhase = 'idle';
  colorIntroSeen = devMode;
  pauseReason = null;
  selectedCarColor = devWorld || 'blue';
  activeWorld = devWorld || 'blue';
}

function randomPortalInterval() {
  return PORTAL_MIN_INTERVAL + Math.floor(Math.random() * (PORTAL_MAX_INTERVAL - PORTAL_MIN_INTERVAL + 1));
}

function randomNightInterval() {
  return NIGHT_MIN_INTERVAL + Math.floor(Math.random() * (NIGHT_MAX_INTERVAL - NIGHT_MIN_INTERVAL + 1));
}

function colorFeatureUnlocked() {
  return devMode || score >= COLOR_UNLOCK_SCORE;
}

function currentTheme() {
  return WORLD_THEMES[activeWorld] || WORLD_THEMES.blue;
}

function cycleCarColor(direction = 1) {
  if (!colorFeatureUnlocked()) return false;
  const idx = COLOR_ORDER.indexOf(selectedCarColor);
  const nextIdx = (idx + direction + COLOR_ORDER.length) % COLOR_ORDER.length;
  selectedCarColor = COLOR_ORDER[nextIdx];
  return true;
}

function endGame() {
  if (score > highScore) highScore = score;
  gameState = 'gameover';
}

// ─── Car Dimensions (top-down view) ─────────────────────────────────────────
function carDims() {
  const r   = roadMetrics();
  const carW = r.laneW * 0.52;
  const carH = carW * 1.85;
  const carY = canvas.height * CAR_Y_FRAC;
  return { carW, carH, carY };
}

// ─── Spawn Object ────────────────────────────────────────────────────────────
function objectLane(obj, r) {
  if (typeof obj.lane === 'number') return obj.lane;
  return Math.abs(obj.x - r.lane0) <= Math.abs(obj.x - r.lane1) ? 0 : 1;
}

function canSpawnObstacleInLane(lane, y, minGap, r) {
  return !objects.some(obj =>
    obj.type === 'obstacle' &&
    objectLane(obj, r) !== lane &&
    Math.abs(obj.y - y) < minGap
  );
}

function canSpawnPortalAt(y, minGap) {
  return !objects.some(obj => Math.abs(obj.y - y) < minGap);
}

function spawnObject() {
  const r    = roadMetrics();
  let lane = Math.random() < 0.5 ? 0 : 1;
  const type = Math.random() < COIN_SPAWN_PROBABILITY ? 'collect' : 'obstacle';
  const size = r.laneW * 0.32;
  const y = -size * 1.2;

  if (type === 'obstacle') {
    const minGap = carDims().carH * OPPOSING_OBSTACLE_GAP_MULT;
    const otherLane = lane === 0 ? 1 : 0;
    if (!canSpawnObstacleInLane(lane, y, minGap, r)) {
      if (!canSpawnObstacleInLane(otherLane, y, minGap, r)) return;
      lane = otherLane;
    }
  }

  const x = lane === 0 ? r.lane0 : r.lane1;
  objects.push({ x, y, type, size, lane });
}

function spawnPortal() {
  if (!colorFeatureUnlocked() || objects.some(obj => obj.type === 'portal')) return;

  const r = roadMetrics();
  const lane = Math.random() < 0.5 ? 0 : 1;
  const choices = COLOR_ORDER.filter(color => color !== activeWorld);
  const color = choices[Math.floor(Math.random() * choices.length)];
  const size = r.laneW * 0.48;
  const y = -size * 1.6;
  const minGap = carDims().carH * 1.8;

  if (!canSpawnPortalAt(y, minGap)) return;

  const x = lane === 0 ? r.lane0 : r.lane1;
  objects.push({ x, y, type: 'portal', size, lane, color });
}

// ─── Collision ───────────────────────────────────────────────────────────────
function collides(obj) {
  const { carW, carH, carY } = carDims();
  const cL = carX  - carW * COLLISION_SCALE / 2;
  const cR = carX  + carW * COLLISION_SCALE / 2;
  const cT = carY  - carH * COLLISION_SCALE / 2;
  const cB = carY  + carH * COLLISION_SCALE / 2;
  const oS = obj.size * 0.85;
  return cL < obj.x + oS && cR > obj.x - oS &&
         cT < obj.y + oS && cB > obj.y - oS;
}

// ─── Update ──────────────────────────────────────────────────────────────────
function update() {
  maybeShowColorIntro();
  updateNightEffect();

  carX += (targetCarX - carX) * LANE_LERP;

  // Scroll road
  roadOffset += speed;

  // Score every 30 frames (~½ s at 60 fps)
  if (++scoreTimer >= 30) { score++; scoreTimer = 0; }

  // Difficulty ramp every ~5 s
  if (++diffTimer >= 300) {
    speed         = Math.min(speed + 0.4, MAX_SPEED);
    spawnInterval = Math.max(spawnInterval - 5, 28);
    diffTimer = 0;
  }

  // Spawn
  if (++spawnTimer >= spawnInterval) {
    spawnObject();
    spawnTimer = 0;
  }

  if (colorFeatureUnlocked() && ++portalTimer >= portalInterval) {
    spawnPortal();
    portalTimer = 0;
    portalInterval = randomPortalInterval();
  }

  // Move & check objects
  for (let i = objects.length - 1; i >= 0; i--) {
    objects[i].y += speed;
    if (objects[i].y > canvas.height + objects[i].size * 2) {
      objects.splice(i, 1);
      continue;
    }
    if (collides(objects[i])) {
      if (objects[i].type === 'obstacle') {
        endGame();
        return;
      } else if (objects[i].type === 'collect') {
        score += 10;
        speed = Math.min(speed + COIN_SPEED_BONUS, MAX_SPEED);
        objects.splice(i, 1);
      } else if (objects[i].type === 'portal') {
        if (selectedCarColor !== objects[i].color) {
          endGame();
          return;
        }
        activeWorld = objects[i].color;
        score += PORTAL_SCORE_BONUS;
        resetNightEffect();
        objects.splice(i, 1);
      }
    }
  }
}

function maybeShowColorIntro() {
  if (!colorIntroSeen && colorFeatureUnlocked()) {
    colorIntroSeen = true;
    pauseReason = 'colorIntro';
    gameState = 'paused';
  }
}

function resetNightEffect() {
  nightTimer = 0;
  nightInterval = randomNightInterval();
  nightPhaseTimer = 0;
  nightPhase = 'idle';
}

function updateNightEffect() {
  if (activeWorld !== 'white') {
    resetNightEffect();
    return;
  }

  if (nightPhase === 'idle') {
    if (++nightTimer >= nightInterval) {
      nightPhase = 'warning';
      nightPhaseTimer = 0;
    }
    return;
  }

  nightPhaseTimer++;
  if (nightPhase === 'warning' && nightPhaseTimer >= NIGHT_WARNING_FRAMES) {
    nightPhase = 'night';
    nightPhaseTimer = 0;
  } else if (nightPhase === 'night' && nightPhaseTimer >= NIGHT_DURATION_FRAMES) {
    resetNightEffect();
  }
}

// ─── Drawing Helpers ─────────────────────────────────────────────────────────

function drawBackground(r) {
  const theme = currentTheme();

  // Grass strips
  ctx.fillStyle = theme.grass;
  ctx.fillRect(0, 0, r.grassW, r.H);
  ctx.fillRect(r.roadR, 0, r.grassW, r.H);

  // Animated grass dots for motion feel
  ctx.fillStyle = theme.grassDot;
  const dotSpacing = r.H * 0.09;
  const dotOffset  = roadOffset * 0.4 % dotSpacing;
  for (let y = -dotSpacing + dotOffset; y < r.H + dotSpacing; y += dotSpacing) {
    const dotR = r.grassW * 0.18;
    ctx.beginPath();
    ctx.arc(r.grassW * 0.35, y,             dotR, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath();
    ctx.arc(r.grassW * 0.70, y + dotSpacing * 0.5, dotR, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath();
    ctx.arc(r.roadR + r.grassW * 0.30, y + dotSpacing * 0.25, dotR, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath();
    ctx.arc(r.roadR + r.grassW * 0.70, y + dotSpacing * 0.75, dotR, 0, Math.PI * 2); ctx.fill();
  }

  if (activeWorld === 'white') drawDreamClouds(r, dotOffset);
  if (activeWorld === 'purple') drawSideCreatures(r, dotOffset);
}

function drawRoad(r) {
  const theme = currentTheme();

  // Road surface
  ctx.fillStyle = theme.road;
  ctx.fillRect(r.roadL, 0, r.roadW, r.H);

  // Edge curbs (yellow)
  ctx.fillStyle = theme.curb;
  ctx.fillRect(r.roadL,     0, 4, r.H);
  ctx.fillRect(r.roadR - 4, 0, 4, r.H);

  // Scrolling centre dashes
  const dashH  = r.H * 0.065;
  const gapH   = r.H * 0.050;
  const period = dashH + gapH;
  const off    = roadOffset % period;
  ctx.fillStyle = theme.dash;
  for (let y = -period + off; y < r.H + period; y += period) {
    ctx.fillRect(r.centerX - 2, y, 4, dashH);
  }
}

function drawDreamCloud(x, y, size) {
  ctx.save();
  ctx.translate(x, y);
  ctx.fillStyle = 'rgba(255,255,255,0.82)';
  ctx.beginPath();
  ctx.arc(-size * 0.34, 0, size * 0.30, 0, Math.PI * 2);
  ctx.arc(0, -size * 0.10, size * 0.38, 0, Math.PI * 2);
  ctx.arc(size * 0.34, 0, size * 0.28, 0, Math.PI * 2);
  ctx.roundRect(-size * 0.55, -size * 0.02, size * 1.1, size * 0.34, size * 0.16);
  ctx.fill();
  ctx.restore();
}

function drawDreamClouds(r, offset) {
  const spacing = r.H * 0.17;
  const drift = offset * 0.65 % spacing;
  for (let y = -spacing + drift; y < r.H + spacing; y += spacing) {
    drawDreamCloud(r.grassW * 0.48, y, r.grassW * 0.95);
    drawDreamCloud(r.roadR + r.grassW * 0.52, y + spacing * 0.45, r.grassW * 0.85);
  }
}

function drawCreature(x, y, size, flip) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(flip ? -1 : 1, 1);

  ctx.fillStyle = '#0a0610';
  ctx.beginPath();
  ctx.ellipse(0, 0, size * 0.45, size * 0.34, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(size * 0.34, -size * 0.22, size * 0.22, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = '#0a0610';
  ctx.lineWidth = Math.max(2, size * 0.07);
  ctx.beginPath();
  ctx.moveTo(-size * 0.30, size * 0.14);
  ctx.quadraticCurveTo(-size * 0.62, size * 0.44, -size * 0.18, size * 0.58);
  ctx.stroke();

  ctx.fillStyle = '#d8b6ff';
  ctx.beginPath();
  ctx.arc(size * 0.29, -size * 0.24, size * 0.035, 0, Math.PI * 2);
  ctx.arc(size * 0.42, -size * 0.24, size * 0.035, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawSideCreatures(r, offset) {
  const spacing = r.H * 0.19;
  const drift = offset * 0.85 % spacing;
  for (let y = -spacing + drift; y < r.H + spacing; y += spacing) {
    drawCreature(r.grassW * 0.44, y, r.grassW * 0.78, false);
    drawCreature(r.roadR + r.grassW * 0.56, y + spacing * 0.48, r.grassW * 0.70, true);
  }
}

function drawObstacle(x, y, size) {
  // Red/orange diamond (rotated square) — danger shape
  const theme = currentTheme();
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(Math.PI / 4);
  const s = size * 0.72;

  // Outer
  ctx.fillStyle   = theme.obstacle;
  ctx.strokeStyle = theme.obstacleStroke;
  ctx.lineWidth   = 2.5;
  ctx.beginPath();
  ctx.roundRect(-s, -s, s * 2, s * 2, s * 0.18);
  ctx.fill();
  ctx.stroke();

  // Inner highlight
  const si = s * 0.45;
  ctx.fillStyle = theme.obstacleInner;
  ctx.beginPath();
  ctx.roundRect(-si, -si, si * 2, si * 2, si * 0.18);
  ctx.fill();

  ctx.restore();
}

function drawCoin(x, y, size) {
  // Collectible uses the obstacle style, but as a circle instead of a diamond.
  const theme = currentTheme();
  ctx.save();
  ctx.translate(x, y);
  const s = size * 0.72;

  // Outer circular body
  ctx.fillStyle   = theme.obstacle;
  ctx.strokeStyle = theme.obstacleStroke;
  ctx.lineWidth   = 2.5;
  ctx.beginPath();
  ctx.arc(0, 0, s, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  // Inner circular highlight
  ctx.fillStyle = theme.obstacleInner;
  ctx.beginPath();
  ctx.arc(0, 0, s * 0.45, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawPortal(x, y, size, color) {
  const palette = CAR_PALETTES[color] || CAR_PALETTES.blue;

  ctx.save();
  ctx.translate(x, y);
  ctx.shadowColor = palette.body;
  ctx.shadowBlur = size * 0.35;

  ctx.strokeStyle = palette.body;
  ctx.lineWidth = Math.max(4, size * 0.16);
  ctx.beginPath();
  ctx.ellipse(0, 0, size * 0.56, size * 0.88, 0, 0, Math.PI * 2);
  ctx.stroke();

  ctx.shadowBlur = 0;
  ctx.strokeStyle = palette.roof;
  ctx.lineWidth = Math.max(2, size * 0.07);
  ctx.beginPath();
  ctx.ellipse(0, 0, size * 0.35, size * 0.64, 0, 0, Math.PI * 2);
  ctx.stroke();

  ctx.fillStyle = color === 'white' ? 'rgba(255,255,255,0.26)' :
                  color === 'purple' ? 'rgba(120,40,190,0.28)' :
                  'rgba(70,165,255,0.22)';
  ctx.beginPath();
  ctx.ellipse(0, 0, size * 0.33, size * 0.60, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawCar(cx, cy, carW, carH, color = selectedCarColor) {
  const palette = CAR_PALETTES[color] || CAR_PALETTES.blue;
  ctx.save();
  ctx.translate(cx, cy);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath();
  ctx.ellipse(4, 6, carW * 0.45, carH * 0.22, 0, 0, Math.PI * 2);
  ctx.fill();

  // Body
  ctx.fillStyle = palette.body;
  ctx.beginPath();
  ctx.roundRect(-carW / 2, -carH / 2, carW, carH, carW * 0.18);
  ctx.fill();

  // Roof
  const rfW = carW * 0.68, rfH = carH * 0.44;
  const rfX = -rfW / 2, rfY = -carH / 2 + carH * 0.10;
  ctx.fillStyle = palette.roof;
  ctx.beginPath();
  ctx.roundRect(rfX, rfY, rfW, rfH, carW * 0.12);
  ctx.fill();

  // Windshield (front – top in top-down)
  ctx.fillStyle = palette.glass;
  ctx.beginPath();
  ctx.roundRect(-carW * 0.27, -carH / 2 + carH * 0.12, carW * 0.54, carH * 0.20, 4);
  ctx.fill();

  // Rear window
  ctx.fillStyle = palette.glass2;
  ctx.beginPath();
  ctx.roundRect(-carW * 0.27, -carH / 2 + carH * 0.36, carW * 0.54, carH * 0.13, 4);
  ctx.fill();

  // Headlights (top)
  ctx.fillStyle = palette.head;
  ctx.beginPath();
  ctx.roundRect(-carW * 0.42, -carH / 2 + carH * 0.03, carW * 0.18, carH * 0.07, 2);
  ctx.fill();
  ctx.beginPath();
  ctx.roundRect( carW * 0.24, -carH / 2 + carH * 0.03, carW * 0.18, carH * 0.07, 2);
  ctx.fill();

  // Tail-lights (bottom)
  ctx.fillStyle = palette.tail;
  ctx.beginPath();
  ctx.roundRect(-carW * 0.42, carH / 2 - carH * 0.10, carW * 0.18, carH * 0.07, 2);
  ctx.fill();
  ctx.beginPath();
  ctx.roundRect( carW * 0.24, carH / 2 - carH * 0.10, carW * 0.18, carH * 0.07, 2);
  ctx.fill();

  ctx.restore();
}

function drawHUD() {
  const theme = currentTheme();
  const fSize = Math.max(14, canvas.height * 0.038);
  ctx.font      = `bold ${fSize}px Arial, sans-serif`;
  ctx.textAlign = 'center';

  // Score shadow
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillText(`Score: ${score}`, canvas.width / 2 + 1, canvas.height * 0.05 + 1);
  ctx.fillStyle = theme.hud;
  ctx.fillText(`Score: ${score}`, canvas.width / 2,     canvas.height * 0.05);

  drawColorStatus();
}

function orderedColorPreview() {
  const idx = COLOR_ORDER.indexOf(selectedCarColor);
  const safeIdx = idx === -1 ? 0 : idx;
  return [
    COLOR_ORDER[(safeIdx - 1 + COLOR_ORDER.length) % COLOR_ORDER.length],
    COLOR_ORDER[safeIdx],
    COLOR_ORDER[(safeIdx + 1) % COLOR_ORDER.length]
  ];
}

function drawColorStatus() {
  if (gameState !== 'playing' || !colorFeatureUnlocked()) return;

  const chipR = Math.max(7, canvas.width * 0.020);
  const gap = chipR * 2.55;
  const x = canvas.width - canvas.width * 0.065;
  const y = canvas.height * 0.095;
  const colors = orderedColorPreview();

  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.24)';
  ctx.beginPath();
  ctx.roundRect(x - chipR * 1.55, y - gap - chipR * 1.45, chipR * 3.1, gap * 2 + chipR * 2.9, chipR * 0.9);
  ctx.fill();

  for (let i = 0; i < colors.length; i++) {
    const color = colors[i];
    const palette = CAR_PALETTES[color];
    const cy = y + (i - 1) * gap;
    const active = color === selectedCarColor;
    ctx.globalAlpha = active ? 1 : 0.76;
    ctx.fillStyle = palette.body;
    ctx.strokeStyle = active ? '#ffffff' : 'rgba(255,255,255,0.45)';
    ctx.lineWidth = active ? 3 : 1.4;
    ctx.beginPath();
    ctx.arc(x, cy, active ? chipR * 1.12 : chipR, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
  }
  ctx.restore();
}

// ─── Overlay Screens ─────────────────────────────────────────────────────────

function drawMenu(r) {
  ctx.fillStyle = 'rgba(0,0,0,0.60)';
  ctx.fillRect(0, 0, r.W, r.H);

  const cx   = r.W / 2;
  const fBig = Math.max(20, r.H * 0.070);
  const fMid = Math.max(14, r.H * 0.038);
  const fSm  = Math.max(12, r.H * 0.030);

  ctx.textAlign = 'center';

  // Title
  ctx.font      = `bold ${fBig}px Arial, sans-serif`;
  ctx.fillStyle = '#ffd700';
  ctx.fillText('LANE DODGER', cx, r.H * 0.26);

  // Instructions
  ctx.font      = `${fMid}px Arial, sans-serif`;
  ctx.fillStyle = '#dddddd';
  ctx.fillText('Tap left or right to steer', cx, r.H * 0.38);

  // Legend items
  const iconY1 = r.H * 0.475;
  const iconY2 = r.H * 0.555;
  const iconS  = r.H * 0.028;

  drawObstacle(cx - r.W * 0.20, iconY1, iconS * 1.2);
  ctx.font      = `${fSm}px Arial, sans-serif`;
  ctx.fillStyle = '#ffaaaa';
  ctx.textAlign = 'left';
  ctx.fillText('Avoid — game over on hit', cx - r.W * 0.10, iconY1 + iconS * 0.4);

  drawCoin(cx - r.W * 0.20, iconY2, iconS * 1.2);
  ctx.fillStyle = '#ffd700';
  ctx.fillText('Collect — +10 points', cx - r.W * 0.10, iconY2 + iconS * 0.4);

  if (highScore > 0) {
    ctx.textAlign = 'center';
    ctx.font      = `${fSm}px Arial, sans-serif`;
    ctx.fillStyle = '#aaaaff';
    ctx.fillText(`Best: ${highScore}`, cx, r.H * 0.64);
  }

  // Pulsing button
  const pulse = 0.94 + 0.06 * Math.sin(frame * 0.06);
  ctx.save();
  ctx.translate(cx, r.H * 0.78);
  ctx.scale(pulse, pulse);
  const btnW = r.W * 0.56, btnH = r.H * 0.10;
  ctx.fillStyle = '#27ae60';
  ctx.beginPath();
  ctx.roundRect(-btnW / 2, -btnH / 2, btnW, btnH, btnH * 0.3);
  ctx.fill();
  ctx.font      = `bold ${fMid * 1.1}px Arial, sans-serif`;
  ctx.fillStyle = '#ffffff';
  ctx.textAlign = 'center';
  ctx.fillText('TAP TO START', 0, fMid * 0.38);
  ctx.restore();
}

function drawNightOverlay(r, carCx, carCy, carW, carH) {
  if (activeWorld !== 'white' || nightPhase === 'idle') return;

  const isWarningDark = nightPhase === 'warning' && Math.floor(nightPhaseTimer / NIGHT_BLINK_FRAMES) % 2 === 1;
  const alpha = nightPhase === 'night' ? 0.88 : (isWarningDark ? 0.56 : 0);
  if (alpha <= 0) return;

  ctx.save();
  ctx.fillStyle = `rgba(2,6,18,${alpha})`;
  ctx.fillRect(0, 0, r.W, r.H);
  ctx.globalCompositeOperation = 'destination-out';
  const beam = ctx.createRadialGradient(carCx, carCy - carH * 0.45, carW * 0.25, carCx, carCy - carH * 1.2, carW * 2.2);
  beam.addColorStop(0, 'rgba(255,255,255,0.95)');
  beam.addColorStop(0.45, 'rgba(255,255,255,0.50)');
  beam.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = beam;
  ctx.beginPath();
  ctx.ellipse(carCx, carCy - carH * 0.85, carW * 2.0, carH * 1.25, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalCompositeOperation = 'source-over';
  ctx.fillStyle = `rgba(255,245,170,${nightPhase === 'night' ? 0.18 : 0.30})`;
  ctx.beginPath();
  ctx.ellipse(carCx, carCy - carH * 0.85, carW * 1.7, carH * 1.05, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawVerticalSwipeIcon(x, y, size) {
  ctx.save();
  ctx.translate(x, y);
  ctx.strokeStyle = '#ffffff';
  ctx.fillStyle = '#ffffff';
  ctx.lineWidth = Math.max(3, size * 0.08);
  ctx.lineCap = 'round';

  ctx.beginPath();
  ctx.moveTo(0, -size * 0.46);
  ctx.lineTo(0, size * 0.46);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(0, -size * 0.54);
  ctx.lineTo(-size * 0.18, -size * 0.34);
  ctx.lineTo(size * 0.18, -size * 0.34);
  ctx.closePath();
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(0, size * 0.54);
  ctx.lineTo(-size * 0.18, size * 0.34);
  ctx.lineTo(size * 0.18, size * 0.34);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

function drawColorIntroModal(r) {
  ctx.fillStyle = 'rgba(0,0,0,0.68)';
  ctx.fillRect(0, 0, r.W, r.H);
  const cx = r.W / 2;
  const boxW = r.W * 0.66;
  const boxH = r.H * 0.24;
  const boxY = r.H * 0.38;
  ctx.fillStyle = 'rgba(20,24,35,0.96)';
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.roundRect(cx - boxW / 2, boxY, boxW, boxH, 18);
  ctx.fill();
  ctx.stroke();

  const carW = boxW * 0.25;
  const carH = carW * 1.85;
  drawCar(cx - boxW * 0.13, boxY + boxH * 0.50, carW, carH, 'purple');
  drawVerticalSwipeIcon(cx + boxW * 0.22, boxY + boxH * 0.50, boxH * 0.54);
}

function drawGameOver(r) {
  ctx.fillStyle = 'rgba(0,0,0,0.72)';
  ctx.fillRect(0, 0, r.W, r.H);

  const cx   = r.W / 2;
  const fBig = Math.max(20, r.H * 0.075);
  const fMid = Math.max(14, r.H * 0.050);
  const fSm  = Math.max(12, r.H * 0.032);

  ctx.textAlign = 'center';

  ctx.font      = `bold ${fBig}px Arial, sans-serif`;
  ctx.fillStyle = '#ff4444';
  ctx.fillText('GAME OVER', cx, r.H * 0.36);

  ctx.font      = `${fMid}px Arial, sans-serif`;
  ctx.fillStyle = '#ffffff';
  ctx.fillText(`Score: ${score}`, cx, r.H * 0.48);

  if (score >= highScore) {
    ctx.font      = `bold ${fSm * 1.1}px Arial, sans-serif`;
    ctx.fillStyle = '#ffd700';
    ctx.fillText('🏆 NEW HIGH SCORE!', cx, r.H * 0.57);
  } else {
    ctx.font      = `${fSm}px Arial, sans-serif`;
    ctx.fillStyle = '#aaaaff';
    ctx.fillText(`Best: ${highScore}`, cx, r.H * 0.57);
  }

  ctx.font      = `${fSm}px Arial, sans-serif`;
  ctx.fillStyle = '#cccccc';
  ctx.fillText('Tap to return to menu', cx, r.H * 0.72);
}

// ─── Main Render ─────────────────────────────────────────────────────────────

function draw() {
  const r = roadMetrics();

  // Clear
  ctx.clearRect(0, 0, r.W, r.H);

  drawBackground(r);
  drawRoad(r);

  // Game objects
  for (const obj of objects) {
    if (obj.type === 'obstacle') drawObstacle(obj.x, obj.y, obj.size);
    else if (obj.type === 'collect') drawCoin(obj.x, obj.y, obj.size);
    else if (obj.type === 'portal')  drawPortal(obj.x, obj.y, obj.size, obj.color);
  }

  // Player car
  const { carW, carH, carY } = carDims();
  drawCar(carX, carY, carW, carH);
  drawNightOverlay(r, carX, carY, carW, carH);

  if (gameState === 'playing') {
    drawHUD();
  } else if (gameState === 'paused') {
    drawHUD();
    drawColorIntroModal(r);
  } else if (gameState === 'menu') {
    drawHUD();
    drawMenu(r);
  } else if (gameState === 'gameover') {
    drawHUD();
    drawGameOver(r);
  }
}

// ─── Input ───────────────────────────────────────────────────────────────────

function handleTap() {
  if (gameState === 'paused') {
    gameState = 'playing';
    pauseReason = null;
    return;
  }
  if (gameState === 'menu') {
    gameState = 'playing';
    initGame();
    return;
  }
  if (gameState === 'gameover') {
    gameState = 'menu';
    return;
  }
  if (gameState === 'playing') {
    setPlayerLane(playerLane === 0 ? 1 : 0);
  }
}

function setPlayerLane(lane) {
  playerLane = lane;
  const r = roadMetrics();
  targetCarX = playerLane === 0 ? r.lane0 : r.lane1;
}

function moveByScreenSide(point) {
  setPlayerLane(point.x < canvas.width / 2 ? 0 : 1);
}

function canvasPoint(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (clientX - rect.left) * (canvas.width / rect.width),
    y: (clientY - rect.top) * (canvas.height / rect.height)
  };
}

function colorSwipeDirection(start, end) {
  const dx = end.x - start.x;
  const dy = end.y - start.y;
  const minDist = Math.max(34, canvas.height * COLOR_SWIPE_MIN_FRAC);
  if (Math.abs(dy) < minDist || Math.abs(dy) <= Math.abs(dx) * 1.25) return 0;
  return dy < 0 ? 1 : -1;
}

function handlePointerPress(point) {
  if (gameState === 'paused') {
    handleTap();
    return;
  }

  if (gameState === 'menu' || gameState === 'gameover') {
    handleTap();
    return;
  }

  if (gameState === 'playing') {
    moveByScreenSide(point);
  }
}

function handleTouchEnd(start, end) {
  if (gameState === 'paused') {
    handleTap();
    return;
  }

  if (gameState === 'menu' || gameState === 'gameover') {
    handleTap();
    return;
  }

  if (gameState === 'playing') {
    const swipeDirection = colorSwipeDirection(start, end);
    if (swipeDirection !== 0 && colorFeatureUnlocked()) {
      cycleCarColor(swipeDirection);
      return;
    }
    moveByScreenSide(end);
  }
}

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  lastTouchTime = Date.now();
  const touch = e.changedTouches[0];
  touchStartPoint = canvasPoint(touch.clientX, touch.clientY);
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  lastTouchTime = Date.now();
  const touch = e.changedTouches[0];
  const endPoint = canvasPoint(touch.clientX, touch.clientY);
  handleTouchEnd(touchStartPoint || endPoint, endPoint);
  touchStartPoint = null;
}, { passive: false });

canvas.addEventListener('touchcancel', () => {
  touchStartPoint = null;
}, { passive: false });

canvas.addEventListener('click', (e) => {
  if (Date.now() - lastTouchTime < 500) return;
  const point = canvasPoint(e.clientX, e.clientY);
  handlePointerPress(point);
});

window.addEventListener('keydown', (e) => {
  if (e.key === ' ' && gameState === 'playing' && colorFeatureUnlocked()) {
    e.preventDefault();
    cycleCarColor();
    return;
  }

  if (e.key === 'ArrowLeft') {
    e.preventDefault();
    if (gameState === 'playing') setPlayerLane(0);
    else handleTap();
    return;
  }

  if (e.key === 'ArrowRight') {
    e.preventDefault();
    if (gameState === 'playing') setPlayerLane(1);
    else handleTap();
    return;
  }

  if (['ArrowUp',' ','Enter'].includes(e.key)) {
    e.preventDefault();
    handleTap();
  }
});

// ─── Game Loop ───────────────────────────────────────────────────────────────

function loop() {
  frame++;
  if (gameState === 'playing') update();
  else if (gameState !== 'paused') roadOffset += 1.5;    // animate road in menu/gameover background
  draw();
  requestAnimationFrame(loop);
}

// ─── Boot ────────────────────────────────────────────────────────────────────
gameState = devMode ? 'playing' : 'menu';
initGame();
loop();
</script>
